<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VANGUARD</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #000000;
      color: #ffffff;
      padding: 16px;
      min-height: 100vh;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #4A90E2;
    }

    .balance-block {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .balance {
      font-weight: 600;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.05);
      padding: 8px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .add-balance-btn {
      background: rgba(74, 144, 226, 0.2);
      border: 1px solid rgba(74, 144, 226, 0.4);
      color: #4A90E2;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .add-balance-btn:active {
      transform: scale(0.9);
      background: rgba(74, 144, 226, 0.4);
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 30px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s;
      color: rgba(255, 255, 255, 0.7);
    }

    .tab.active {
      background: rgba(74, 144, 226, 0.2);
      border-color: rgba(74, 144, 226, 0.4);
      color: #ffffff;
      font-weight: 600;
    }

    .section {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cases-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .case-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .case-card:active {
      transform: scale(0.95);
      background: rgba(255, 255, 255, 0.06);
    }

    .case-icon { font-size: 44px; margin-bottom: 8px; }
    .case-name { font-weight: 600; margin-bottom: 4px; }
    .case-price { color: #4A90E2; font-weight: 500; font-size: 14px; }

    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      animation: fadeIn 0.2s;
    }

    .modal {
      background: rgba(20,20,20,0.9);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 24px;
      max-width: 320px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    .spinner { font-size: 64px; animation: spin 1s linear infinite; margin: 20px 0; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .price-table { width: 100%; border-collapse: collapse; }
    .price-table th, .price-table td {
      padding: 12px 8px; text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .price-table th {
      color: rgba(255,255,255,0.5); font-weight: 500; font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .price-up { color: #34c759; }
    .price-down { color: #ff453a; }

    .team-list, .match-list { display: flex; flex-direction: column; gap: 8px; }

    .team-card, .match-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn {
      background: rgba(74,144,226,0.15);
      border: 1px solid rgba(74,144,226,0.3);
      color: #ffffff;
      border-radius: 14px;
      padding: 10px 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    .btn:active { background: rgba(74,144,226,0.3); transform: scale(0.97); }

    .input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
      color: #ffffff;
      width: 100%;
      margin: 8px 0;
      outline: none;
      font-size: 14px;
      transition: border 0.2s;
    }
    .input:focus { border-color: #4A90E2; }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0;
    }

    /* Стеклянный ползунок */
    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #4A90E2;
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 12px rgba(74,144,226,0.5);
      cursor: pointer;
      transition: transform 0.2s;
    }
    input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(1.2);
    }

    .promo-input-block { display: flex; gap: 8px; margin-top: 8px; }
    .promo-input-block .input { flex: 1; margin: 0; }

    hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 20px 0; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">VANGUARD</div>
    <div class="balance-block">
      <div class="balance" id="balanceDisplay">₽ 1000</div>
      <div class="add-balance-btn" id="addBalanceBtn">+</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-section="cases">Кейсы</button>
    <button class="tab" data-section="prices">Скины</button>
    <button class="tab" data-section="teams">Команды</button>
    <button class="tab" data-section="matches">Матчи</button>
    <button class="tab" data-section="promo">Промокоды</button>
  </div>

  <!-- Кейсы -->
  <div id="section-cases" class="section active">
    <div class="cases-grid" id="casesContainer"></div>
    <div id="caseModal" class="modal-overlay" style="display: none;">
      <div class="modal">
        <div class="spinner" id="caseSpinner">🎁</div>
        <div id="caseResult"></div>
        <button class="btn" id="closeCaseBtn" style="margin-top: 16px;">Закрыть</button>
      </div>
    </div>
  </div>

  <!-- Цены -->
  <div id="section-prices" class="section">
    <div class="glass-panel">
      <table class="price-table">
        <thead><tr><th>Скин</th><th>Качество</th><th>Цена</th></tr></thead>
        <tbody id="pricesBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Команды -->
  <div id="section-teams" class="section">
    <div class="glass-panel">
      <h3 style="margin-bottom: 12px;">Мои команды</h3>
      <div class="team-list" id="teamList"></div>
      <button class="btn" id="createTeamBtn" style="margin-top: 12px;">+ Создать команду</button>
      <div id="createTeamForm" style="display:none; margin-top: 12px;">
        <input class="input" id="teamNameInput" placeholder="Название команды">
        <button class="btn" id="saveTeamBtn" style="margin-top: 8px;">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Матчи -->
  <div id="section-matches" class="section">
    <div class="glass-panel">
      <h3 style="margin-bottom: 12px;">Создать матч</h3>
      <div class="slider-container">
        <span>Игроков: <strong id="playersCountLabel">3</strong></span>
        <input type="range" id="playersSlider" min="1" max="5" value="3">
      </div>
      <input class="input" id="betAmountInput" type="number" placeholder="Ставка с игрока (₽)">
      <button class="btn" id="createMatchBtn" style="margin-top: 8px;">Создать матч</button>
    </div>
    <div class="glass-panel">
      <h3 style="margin-bottom: 12px;">Активные матчи</h3>
      <div class="match-list" id="matchList"></div>
    </div>
  </div>

  <!-- Промокоды -->
  <div id="section-promo" class="section">
    <div class="glass-panel">
      <h3 style="margin-bottom: 12px;">Активация промокода</h3>
      <div class="promo-input-block">
        <input class="input" id="promoCodeInput" placeholder="Введите код">
        <button class="btn" id="activatePromoBtn">Активировать</button>
      </div>
      <p style="font-size:12px; color: rgba(255,255,255,0.4); margin-top: 8px;">Коды: VANGUARD2026, SKINUP, START</p>
      <div id="promoMessage" style="margin-top: 8px; font-weight: 500;"></div>
    </div>
  </div>

  <!-- Пополнение баланса -->
  <div id="topupModal" class="modal-overlay" style="display: none;">
    <div class="modal">
      <h3>Пополнение баланса</h3>
      <div style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 16px 0;">
        <button class="btn topup-amount" data-amount="100">100 ₽</button>
        <button class="btn topup-amount" data-amount="500">500 ₽</button>
        <button class="btn topup-amount" data-amount="1000">1000 ₽</button>
        <button class="btn topup-amount" data-amount="5000">5000 ₽</button>
      </div>
      <button class="btn" id="closeTopupBtn" style="background: rgba(255,255,255,0.05);">Отмена</button>
    </div>
  </div>

  <!-- Детали матча -->
  <div id="matchDetailsModal" class="modal-overlay" style="display: none;">
    <div class="modal" style="text-align: left;">
      <h3 id="matchDetailsTitle"></h3>
      <p id="matchDetailsInfo" style="margin: 12px 0;"></p>
      <div id="matchActions" style="display: flex; flex-direction: column; gap: 8px;">
        <button class="btn" id="finishMatchBtn">✅ Завершить матч</button>
        <button class="btn" id="cancelMatchBtn" style="background: rgba(255,69,58,0.15); border-color: rgba(255,69,58,0.3);">❌ Отменить матч</button>
      </div>
      <button class="btn" id="sendVideoBtn" style="display:none; margin-top: 8px;">📹 Отправить видео @VGNprod</button>
      <button class="btn" id="closeMatchDetailsBtn" style="margin-top:8px; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2);">Закрыть</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // --- Хранилище (localStorage) ---
    function loadData(key, defaultValue) {
      try {
        const saved = localStorage.getItem('vanguard_' + key);
        return saved ? JSON.parse(saved) : defaultValue;
      } catch (e) {
        return defaultValue;
      }
    }
    function saveData(key, value) {
      localStorage.setItem('vanguard_' + key, JSON.stringify(value));
    }

    // Баланс
    let balance = loadData('balance', 1000);
    const balanceEl = document.getElementById('balanceDisplay');
    function updateBalanceDisplay() { balanceEl.textContent = `₽ ${balance}`; }
    function changeBalance(amount) {
      balance += amount;
      if (balance < 0) balance = 0;
      saveData('balance', balance);
      updateBalanceDisplay();
    }
    updateBalanceDisplay();

    // Кейсы
    const cases = [
      { name: 'Revolution Case', icon: '🔫', price: 150 },
      { name: 'Dreams & Nightmares', icon: '🌙', price: 200 },
      { name: 'Recoil Case', icon: '💥', price: 120 },
      { name: 'Fracture Case', icon: '🧩', price: 180 }
    ];

    // Команды
    let teams = loadData('teams', [
      { name: 'Vortex', members: 3 },
      { name: 'Shadow', members: 5 }
    ]);

    // Матчи (сохраняются)
    let matches = loadData('matches', []);
    let selectedMatchIndex = null;

    // Промокоды
    const promoCodes = {
      'VANGUARD2026': { reward: 300, message: 'Получено 300 ₽ по промокоду!' },
      'SKINUP': { reward: 150, message: 'Бонус 150 ₽ за активацию!' },
      'START': { reward: 100, message: 'Стартовый бонус 100 ₽!' }
    };
    const usedPromos = loadData('usedPromos', []);

    // Навигация
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const sectionId = 'section-' + tab.dataset.section;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
      });
    });

    // ====== Кейсы ======
    const casesContainer = document.getElementById('casesContainer');
    function renderCases() {
      casesContainer.innerHTML = cases.map(c => `
        <div class="case-card" data-index="${cases.indexOf(c)}">
          <div class="case-icon">${c.icon}</div>
          <div class="case-name">${c.name}</div>
          <div class="case-price">${c.price} ₽</div>
        </div>
      `).join('');
      document.querySelectorAll('.case-card').forEach(card => {
        card.addEventListener('click', () => openCase(parseInt(card.dataset.index)));
      });
    }
    renderCases();

    function openCase(index) {
      if (balance < cases[index].price) {
        tg.showAlert('Недостаточно средств!');
        return;
      }
      changeBalance(-cases[index].price);
      const modal = document.getElementById('caseModal');
      const spinner = document.getElementById('caseSpinner');
      const resultDiv = document.getElementById('caseResult');
      modal.style.display = 'flex';
      resultDiv.innerHTML = '';
      spinner.style.display = 'block';

      setTimeout(() => {
        const skins = ['AK-47 | Redline', 'M4A1-S | Printstream', 'AWP | Dragon Lore', 'Desert Eagle | Blaze', 'Glock-18 | Fade'];
        const won = skins[Math.floor(Math.random() * skins.length)];
        spinner.style.display = 'none';
        resultDiv.innerHTML = `<div style="font-size:28px; margin:16px 0;">🎉 ${won}</div><p>Вы выиграли этот скин!</p>`;
      }, 2000);
    }

    document.getElementById('closeCaseBtn').addEventListener('click', () => {
      document.getElementById('caseModal').style.display = 'none';
    });

    // ====== Цены ======
    const pricesBody = document.getElementById('pricesBody');
    const skinsData = [
      { name: 'AK-47 | Redline', condition: 'Field-Tested', price: 3500 },
      { name: 'M4A1-S | Printstream', condition: 'Minimal Wear', price: 12000 },
      { name: 'AWP | Asiimov', condition: 'Field-Tested', price: 8900 },
      { name: 'USP-S | Cortex', condition: 'Factory New', price: 2200 }
    ];
    function renderPrices() {
      pricesBody.innerHTML = skinsData.map(s => {
        const change = (Math.random() * 200 - 100).toFixed(0);
        const sign = change >= 0 ? '+' : '';
        const colorClass = change >= 0 ? 'price-up' : 'price-down';
        const newPrice = (s.price + parseInt(change)).toFixed(0);
        return `<tr>
          <td>${s.name}</td><td>${s.condition}</td>
          <td class="${colorClass}">₽ ${newPrice} <small>(${sign}${change})</small></td>
        </tr>`;
      }).join('');
    }
    renderPrices();
    setInterval(renderPrices, 5000);

    // ====== Команды ======
    const teamList = document.getElementById('teamList');
    const createTeamForm = document.getElementById('createTeamForm');
    const teamNameInput = document.getElementById('teamNameInput');

    function renderTeams() {
      teamList.innerHTML = teams.map(t => `
        <div class="team-card">
          <div><strong>${t.name}</strong> (${t.members} игроков)</div>
          <button class="btn" onclick="tg.showAlert('Приглашение отправлено (симуляция)')">Войти</button>
        </div>
      `).join('');
    }
    renderTeams();

    document.getElementById('createTeamBtn').addEventListener('click', () => {
      createTeamForm.style.display = 'block';
    });
    document.getElementById('saveTeamBtn').addEventListener('click', () => {
      const name = teamNameInput.value.trim();
      if (!name) return;
      teams.push({ name, members: 1 });
      teamNameInput.value = '';
      createTeamForm.style.display = 'none';
      saveData('teams', teams);
      renderTeams();
      tg.showAlert('Команда создана!');
    });

    // ====== Матчи ======
    const playersSlider = document.getElementById('playersSlider');
    const playersCountLabel = document.getElementById('playersCountLabel');
    const betAmountInput = document.getElementById('betAmountInput');
    const matchList = document.getElementById('matchList');
    const matchDetailsModal = document.getElementById('matchDetailsModal');

    playersSlider.addEventListener('input', () => {
      playersCountLabel.textContent = playersSlider.value;
    });

    function renderMatches() {
      matchList.innerHTML = matches.map((m, i) => `
        <div class="match-card">
          <div>ID: ${m.id} | ${m.players}/${m.maxPlayers} игроков | Ставка: ₽${m.bet} ${m.status === 'finished' ? ' (завершён)' : ''}</div>
          <button class="btn match-detail-btn" data-index="${i}">Детали</button>
        </div>
      `).join('');
      document.querySelectorAll('.match-detail-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          showMatchDetails(parseInt(e.target.dataset.index));
        });
      });
    }

    function saveMatches() {
      saveData('matches', matches);
    }

    document.getElementById('createMatchBtn').addEventListener('click', () => {
      const maxPlayers = parseInt(playersSlider.value);
      const bet = parseInt(betAmountInput.value);
      if (!bet || bet <= 0) {
        tg.showAlert('Укажите корректную ставку');
        return;
      }
      if (balance < bet) {
        tg.showAlert('Недостаточно средств для ставки');
        return;
      }
      changeBalance(-bet);
      const match = {
        id: Math.floor(Math.random() * 10000),
        maxPlayers,
        players: 1,
        bet,
        status: 'active', // active/finished
        participants: [tg.initDataUnsafe?.user?.first_name || 'Вы']
      };
      matches.push(match);
      saveMatches();
      renderMatches();
      tg.showAlert(`Матч #${match.id} создан!`);
    });

    function showMatchDetails(index) {
      const match = matches[index];
      if (!match) return;
      selectedMatchIndex = index;
      document.getElementById('matchDetailsTitle').textContent = `Матч #${match.id}`;
      document.getElementById('matchDetailsInfo').innerHTML = `
        Статус: ${match.status === 'finished' ? 'Завершён' : 'Активен'}<br>
        Участников: ${match.players}/${match.maxPlayers}<br>
        Ставка: ₽${match.bet} с каждого<br>
        Призовой фонд: ₽${match.bet * match.maxPlayers} (при полной лобби)
      `;

      const finishBtn = document.getElementById('finishMatchBtn');
      const cancelBtn = document.getElementById('cancelMatchBtn');
      const sendVideoBtn = document.getElementById('sendVideoBtn');
      const actionsDiv = document.getElementById('matchActions');

      if (match.status === 'finished') {
        actionsDiv.style.display = 'none';
        sendVideoBtn.style.display = 'block';
      } else {
        actionsDiv.style.display = 'flex';
        sendVideoBtn.style.display = 'none';
      }

      matchDetailsModal.style.display = 'flex';
    }

    // Завершить матч
    document.getElementById('finishMatchBtn').addEventListener('click', () => {
      if (selectedMatchIndex === null) return;
      matches[selectedMatchIndex].status = 'finished';
      saveMatches();
      renderMatches();
      showMatchDetails(selectedMatchIndex); // обновим окно
      tg.showAlert('Матч завершён. Теперь можно отправить видео.');
    });

    // Отменить матч
    document.getElementById('cancelMatchBtn').addEventListener('click', () => {
      if (selectedMatchIndex === null) return;
      const match = matches[selectedMatchIndex];
      if (match.status === 'finished') {
        tg.showAlert('Завершённый матч нельзя отменить.');
        return;
      }
      // Возвращаем ставку
      changeBalance(match.bet);
      matches.splice(selectedMatchIndex, 1);
      saveMatches();
      renderMatches();
      matchDetailsModal.style.display = 'none';
      tg.showAlert('Матч отменён, ставка возвращена.');
    });

    // Отправить видео (через нативный линк)
    document.getElementById('sendVideoBtn').addEventListener('click', () => {
      // Открываем чат с указанным пользователем
      tg.openTelegramLink('https://t.me/VGNprod');
    });

    document.getElementById('closeMatchDetailsBtn').addEventListener('click', () => {
      matchDetailsModal.style.display = 'none';
    });
    matchDetailsModal.addEventListener('click', (e) => {
      if (e.target === matchDetailsModal) matchDetailsModal.style.display = 'none';
    });

    renderMatches();

    // ====== Пополнение ======
    const topupModal = document.getElementById('topupModal');
    document.getElementById('addBalanceBtn').addEventListener('click', () => {
      topupModal.style.display = 'flex';
    });
    document.getElementById('closeTopupBtn').addEventListener('click', () => {
      topupModal.style.display = 'none';
    });
    document.querySelectorAll('.topup-amount').forEach(btn => {
      btn.addEventListener('click', () => {
        const amount = parseInt(btn.dataset.amount);
        changeBalance(amount);
        topupModal.style.display = 'none';
        tg.showAlert(`Баланс пополнен на ${amount} ₽`);
      });
    });
    topupModal.addEventListener('click', (e) => {
      if (e.target === topupModal) topupModal.style.display = 'none';
    });

    // ====== Промокоды ======
    const promoInput = document.getElementById('promoCodeInput');
    const promoMessage = document.getElementById('promoMessage');
    document.getElementById('activatePromoBtn').addEventListener('click', () => {
      const code = promoInput.value.trim().toUpperCase();
      if (!code) {
        promoMessage.textContent = 'Введите код';
        promoMessage.style.color = '#ff453a';
        return;
      }
      if (usedPromos.includes(code)) {
        promoMessage.textContent = 'Этот код уже использован';
        promoMessage.style.color = '#ff453a';
        return;
      }
      const promo = promoCodes[code];
      if (promo) {
        changeBalance(promo.reward);
        usedPromos.push(code);
        saveData('usedPromos', usedPromos);
        promoMessage.textContent = promo.message;
        promoMessage.style.color = '#34c759';
        tg.showAlert(promo.message);
      } else {
        promoMessage.textContent = 'Недействительный промокод';
        promoMessage.style.color = '#ff453a';
      }
      promoInput.value = '';
    });

    // Закрытие модалок по оверлею
    document.getElementById('caseModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) e.currentTarget.style.display = 'none';
    });
  </script>
</body>
</html>
