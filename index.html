<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VANGUARD</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #000;
      color: #fff;
      padding: 16px;
      min-height: 100vh;
    }

    /* Стеклянные панели */
    .glass-panel {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #4A90E2;
    }
    .balance-block {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .balance {
      font-weight: 600;
      font-size: 16px;
      background: rgba(255,255,255,0.05);
      padding: 8px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .add-balance-btn {
      background: rgba(74,144,226,0.2);
      border: 1px solid rgba(74,144,226,0.4);
      color: #4A90E2;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-balance-btn:active {
      transform: scale(0.9);
      background: rgba(74,144,226,0.4);
    }

    /* Вкладки без скроллбара */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 10px 20px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 30px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s;
      color: rgba(255,255,255,0.7);
    }
    .tab.active {
      background: rgba(74,144,226,0.2);
      border-color: rgba(74,144,226,0.4);
      color: #fff;
      font-weight: 600;
    }

    .section {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .section.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Кейсы сетка */
    .cases-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .case-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .case-card:active {
      transform: scale(0.95);
      background: rgba(255,255,255,0.06);
    }
    .case-icon { font-size: 44px; margin-bottom: 8px; }
    .case-name { font-weight: 600; margin-bottom: 4px; }
    .case-price { color: #4A90E2; font-weight: 500; font-size: 14px; }

    /* Модальное окно кейса с анимацией */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal {
      background: rgba(20,20,20,0.9);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 24px;
      max-width: 360px;
      width: 90%;
      text-align: center;
    }
    .case-roulette {
      display: flex;
      overflow: hidden;
      width: 100%;
      height: 80px;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: 16px 0;
    }
    .roulette-item {
      min-width: 80px;
      font-size: 40px;
      transition: transform 0.1s;
    }

    .btn {
      background: rgba(74,144,226,0.15);
      border: 1px solid rgba(74,144,226,0.3);
      color: #fff;
      border-radius: 14px;
      padding: 10px 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    .btn:active { background: rgba(74,144,226,0.3); transform: scale(0.97); }
    .input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
      color: #fff;
      width: 100%;
      margin: 8px 0;
      outline: none;
    }
    .input:focus { border-color: #4A90E2; }

    /* Слайдер стеклянный */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #4A90E2;
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 12px rgba(74,144,226,0.5);
    }

    .team-list, .match-list, .inventory-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .team-card, .match-card, .item-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .item-card img {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">VANGUARD</div>
    <div class="balance-block">
      <div class="balance" id="balanceDisplay">₽ 1000</div>
      <div class="add-balance-btn" id="addBalanceBtn">+</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-section="cases">Кейсы</button>
    <button class="tab" data-section="prices">Скины</button>
    <button class="tab" data-section="teams">Команды</button>
    <button class="tab" data-section="matches">Матчи</button>
    <button class="tab" data-section="promo">Промокоды</button>
    <button class="tab" data-section="profile">Профиль</button>
  </div>

  <!-- Кейсы -->
  <div id="section-cases" class="section active">
    <div class="glass-panel">
      <h3 style="margin-bottom: 8px;">Количество кейсов</h3>
      <div class="slider-container" style="margin: 0 0 12px 0;">
        <span>Открыть: <strong id="caseCountLabel">1</strong></span>
        <input type="range" id="caseCountSlider" min="1" max="10" value="1">
      </div>
    </div>
    <div class="cases-grid" id="casesContainer"></div>
    <div id="caseModal" class="modal-overlay" style="display: none;">
      <div class="modal">
        <div class="case-roulette" id="rouletteContainer"></div>
        <div id="caseResultText"></div>
        <button class="btn" id="closeCaseBtn" style="margin-top: 16px;">Закрыть</button>
      </div>
    </div>
  </div>

  <!-- Цены -->
  <div id="section-prices" class="section">
    <div class="glass-panel">
      <table class="price-table" style="width:100%; border-collapse:collapse;">
        <thead><tr><th>Скин</th><th>Качество</th><th>Цена</th></tr></thead>
        <tbody id="pricesBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Команды -->
  <div id="section-teams" class="section">
    <div class="glass-panel">
      <h3>Мои команды</h3>
      <div class="team-list" id="teamList"></div>
      <button class="btn" id="createTeamBtn" style="margin-top: 12px;">+ Создать команду</button>
      <div id="createTeamForm" style="display:none; margin-top: 12px;">
        <input class="input" id="teamNameInput" placeholder="Название команды">
        <button class="btn" id="saveTeamBtn" style="margin-top: 8px;">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Матчи -->
  <div id="section-matches" class="section">
    <div class="glass-panel">
      <h3>Создать матч</h3>
      <div class="slider-container">
        <span>Игроков: <strong id="playersCountLabel">3</strong></span>
        <input type="range" id="playersSlider" min="1" max="5" value="3">
      </div>
      <input class="input" id="betAmountInput" type="number" placeholder="Ставка с игрока (₽)">
      <button class="btn" id="createMatchBtn">Создать матч</button>
    </div>
    <div class="glass-panel">
      <h3>Активные матчи</h3>
      <div class="match-list" id="matchList"></div>
    </div>
  </div>

  <!-- Промокоды -->
  <div id="section-promo" class="section">
    <div class="glass-panel">
      <h3>Активация промокода</h3>
      <div style="display:flex; gap:8px;">
        <input class="input" id="promoCodeInput" placeholder="Введите код">
        <button class="btn" id="activatePromoBtn">Активировать</button>
      </div>
      <p style="font-size:12px; color: rgba(255,255,255,0.4); margin-top: 8px;">Коды: VANGUARD2026, SKINUP, START</p>
      <div id="promoMessage" style="margin-top: 8px; font-weight: 500;"></div>
    </div>
  </div>

  <!-- Профиль -->
  <div id="section-profile" class="section">
    <div class="glass-panel">
      <h3>Профиль</h3>
      <div style="margin: 8px 0;">
        <label>Никнейм:</label>
        <div style="display:flex; gap:8px;">
          <input class="input" id="nicknameInput" placeholder="Введите ник">
          <button class="btn" id="saveNicknameBtn">Сохранить</button>
        </div>
        <div id="nicknameStatus" style="font-size:12px; margin-top:4px;"></div>
      </div>
      <div style="margin: 16px 0;">
        <label>Trade-ссылка CS:GO:</label>
        <input class="input" id="tradeLinkInput" placeholder="https://steamcommunity.com/tradeoffer/new/?partner=...">
        <button class="btn" id="saveTradeLinkBtn" style="margin-top:4px;">Сохранить</button>
        <a id="steamTradeBtn" class="btn" style="display:inline-block; margin-top:8px; text-decoration:none;" target="_blank">🔗 Перейти к трейду</a>
      </div>
    </div>
    <div class="glass-panel">
      <h3>Инвентарь</h3>
      <div class="inventory-list" id="inventoryList"></div>
      <p style="color: rgba(255,255,255,0.4); margin-top: 8px;">Вы можете продать предмет или вывести (нужна trade-ссылка).</p>
    </div>
  </div>

  <!-- Пополнение (модальное) -->
  <div id="topupModal" class="modal-overlay" style="display: none;">
    <div class="modal">
      <h3>Пополнение</h3>
      <div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:16px 0;">
        <button class="btn topup-amount" data-amount="100">100 ₽</button>
        <button class="btn topup-amount" data-amount="500">500 ₽</button>
        <button class="btn topup-amount" data-amount="1000">1000 ₽</button>
        <button class="btn topup-amount" data-amount="5000">5000 ₽</button>
      </div>
      <button class="btn" id="closeTopupBtn" style="background: rgba(255,255,255,0.05);">Отмена</button>
    </div>
  </div>

  <!-- Детали матча -->
  <div id="matchDetailsModal" class="modal-overlay" style="display: none;">
    <div class="modal" style="text-align: left;">
      <h3 id="matchDetailsTitle"></h3>
      <p id="matchDetailsInfo"></p>
      <div id="matchActions">
        <button class="btn" id="finishMatchBtn">✅ Завершить матч</button>
        <button class="btn" id="cancelMatchBtn" style="background: rgba(255,69,58,0.15);">❌ Отменить матч</button>
      </div>
      <button class="btn" id="sendVideoBtn" style="display:none; margin-top:8px;">📹 Отправить видео @VGNprod</button>
      <button class="btn" id="closeMatchDetailsBtn" style="margin-top:8px;">Закрыть</button>
    </div>
  </div>

  <script>
    // Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // ---------- Хранилище ----------
    function load(key, def) {
      try {
        const saved = localStorage.getItem('vng_' + key);
        return saved ? JSON.parse(saved) : def;
      } catch (e) { return def; }
    }
    function save(key, val) {
      localStorage.setItem('vng_' + key, JSON.stringify(val));
    }

    // ---------- Баланс ----------
    let balance = load('balance', 1000);
    const balanceEl = document.getElementById('balanceDisplay');
    function updateBalanceDisplay() { balanceEl.textContent = `₽ ${balance}`; }
    function changeBalance(amt) {
      balance += amt;
      if (balance < 0) balance = 0;
      save('balance', balance);
      updateBalanceDisplay();
    }
    updateBalanceDisplay();

    // ---------- Никнейм и занятые ники ----------
    let profile = load('profile', { nickname: '', tradeLink: '' });
    let takenNicknames = load('takenNicknames', []);
    function isNicknameTaken(nick) {
      return takenNicknames.includes(nick.toLowerCase());
    }
    function registerNickname(nick) {
      if (!isNicknameTaken(nick)) {
        takenNicknames.push(nick.toLowerCase());
        save('takenNicknames', takenNicknames);
        return true;
      }
      return false;
    }

    // ---------- Инвентарь ----------
    let inventory = load('inventory', []); // { name, image, price, quality }

    // ---------- Кейсы с реальными изображениями (Steam CDN) ----------
    const cases = [
      { name: 'Revolution Case', icon: '🔫', price: 150, items: [
        { name: 'AK-47 | Head Shot', image: 'https://community.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhjxczJemkV092lnYmGmOHLPr7Vn35c18lwmO7Eu92s2wCwrhVrYW_7ItKccARqaAvX-1O2yOvr1MW0vMjPnXM3pyQj5S7byBCygU0YbuA', price: 450 },
        { name: 'M4A1-S | Emphorosaur-S', image: 'https://community.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhz2v_Nfz5H_uO1gb-GwqKfq-nsNqjZq-NUw-3Fo92i2AHiqEQ-ZG-hJ4-Qd1RsZAzTqFjokfLv1Me-uZ6cmWp9w7worw', price: 380 },
        { name: 'AWP | Duality', image: 'https://community.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FBRw7PLfYQJS9dCokZOFnPSkarnAwG9U6MBOhuDG_Zi7jQO3-UI4am30cY_DelNsZAvW-FS5yei4jZO9uZ_JzWwj5Hc', price: 1200 }
      ]},
      { name: 'Dreams & Nightmares', icon: '🌙', price: 200, items: [
        { name: 'Desert Eagle | Midnight', image: 'https://community.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgposr-kLAtl7PLFTjdN09-7lYyCmfOkqPrnNqjDqWgNusmG34-JaVSkqkVtfmj5IYeTI1JsYQ2EryzqkO3thJDotZvPmCE2pGB8sl3UrG6r1Q', price: 280 },
        { name: 'USP-S | Dream', image: 'https://community.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpoo6m0FFNhws_GazsS59C5m5GP2vH3NqnJhm5D-cBOhuDG_Zi7jAO3r0dqa3b0d4WRJ1U3aQvTrFm8wOrphJW_vc6aznBruHch', price: 310 }
      ]},
      { name: 'Recoil Case', icon: '💥', price: 120, items: [
        { name: 'Glock-18 | Bullet Rain', image: 'https://community.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgposbaqKAxf0v73dShS89S4lZeHmPTxDL3dxnNN4cBOhuDG_Zi7jAO3_kA_Z2ymcYCUdgRqYFrRq1XowLrqgpfpvcjLzHU1vSE9pSLcjAuwn1gSOKKICoU', price: 190 },
        { name: 'M4A4 | Poly Mag', image: 'https://community.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhz2v_Nfz5H_uO1gb-GwqKfq-nsNqjZq-NUw-3Fo92i2AHiqEQ-Z2ymcYCUdgRqYFrRq1XowLrqgpfpvcjLzHU1vSE9pSLcjAuwn1gSOKKICoU', price: 220 }
      ]},
      { name: 'Fracture Case', icon: '🧩', price: 180, items: [
        { name: 'SSG 08 | Fever Dream', image: 'https://community.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpopamie19f0Ob3Yi5M7cWEmpqFz_LwDLfYk2pU-sV3wO2S94ms2FXk-kQ9ZmvyJ4fAdwc3aFuBqALoxL3ogJTotZ7OyHM2p3Qm5yrdy0e3g0oNbuw', price: 350 }
      ]}
    ];

    // ---------- Команды и матчи ----------
    let teams = load('teams', [
      { name: 'Vortex', members: 3 },
      { name: 'Shadow', members: 5 }
    ]);
    let myMatches = load('matches', []);

    // Для имитации общих матчей генерируем демо-матчи
    function generateGlobalMatches() {
      return [
        { id: 101, maxPlayers: 2, players: 2, bet: 500, status: 'active' },
        { id: 202, maxPlayers: 3, players: 1, bet: 300, status: 'active' },
        { id: 303, maxPlayers: 5, players: 4, bet: 1000, status: 'active' }
      ];
    }
    let globalMatches = generateGlobalMatches();

    // ---------- UI функции ----------
    function showSection(sectionId) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('section-' + sectionId).classList.add('active');
    }

    // Навигация по вкладкам
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        showSection(tab.dataset.section);
      });
    });

    // ========== Кейсы ==========
    const casesContainer = document.getElementById('casesContainer');
    const caseCountSlider = document.getElementById('caseCountSlider');
    const caseCountLabel = document.getElementById('caseCountLabel');
    let openCaseCount = 1;

    caseCountSlider.addEventListener('input', () => {
      openCaseCount = parseInt(caseCountSlider.value);
      caseCountLabel.textContent = openCaseCount;
    });

    function renderCases() {
      casesContainer.innerHTML = cases.map((c, idx) => `
        <div class="case-card" data-index="${idx}">
          <div class="case-icon">${c.icon}</div>
          <div class="case-name">${c.name}</div>
          <div class="case-price">${c.price} ₽</div>
        </div>
      `).join('');
      document.querySelectorAll('.case-card').forEach(card => {
        card.addEventListener('click', () => {
          const caseIdx = parseInt(card.dataset.index);
          startCaseOpening(caseIdx, openCaseCount);
        });
      });
    }
    renderCases();

    function startCaseOpening(caseIdx, count) {
      const totalCost = cases[caseIdx].price * count;
      if (balance < totalCost) {
        tg.showAlert('Недостаточно средств!');
        return;
      }
      changeBalance(-totalCost);
      document.getElementById('caseModal').style.display = 'flex';
      const roulette = document.getElementById('rouletteContainer');
      const resultText = document.getElementById('caseResultText');
      resultText.innerHTML = '';

      const items = cases[caseIdx].items;
      let opened = 0;
      const results = [];

      function spinOne() {
        roulette.innerHTML = '';
        const spinDuration = 2000;
        const steps = 20;
        const interval = spinDuration / steps;
        let step = 0;
        const selected = items[Math.floor(Math.random() * items.length)];

        const timer = setInterval(() => {
          roulette.innerHTML = `<div class="roulette-item">${items[Math.floor(Math.random() * items.length)].image ? `<img src="${items[Math.floor(Math.random() * items.length)].image}" style="width:64px; height:64px; object-fit:contain;">` : items[Math.floor(Math.random() * items.length)].name}</div>`;
          step++;
          if (step >= steps) {
            clearInterval(timer);
            roulette.innerHTML = `<div class="roulette-item"><img src="${selected.image}" style="width:64px; height:64px; object-fit:contain;"><br>${selected.name}</div>`;
            results.push(selected);
            opened++;
            if (opened < count) {
              setTimeout(spinOne, 500);
            } else {
              // Добавляем в инвентарь
              results.forEach(item => inventory.push({...item}));
              save('inventory', inventory);
              resultText.innerHTML = `Выпало: ${results.map(r => r.name).join(', ')}`;
              updateInventoryUI();
            }
          }
        }, interval);
      }
      spinOne();
    }

    document.getElementById('closeCaseBtn').addEventListener('click', () => {
      document.getElementById('caseModal').style.display = 'none';
    });

    // ========== Цены (реальное время с изображениями) ==========
    const pricesBody = document.getElementById('pricesBody');
    const skinsMarket = [
      { name: 'AK-47 | Redline', image: 'https://community.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhjxczJemkV092lnYmGmOHLPr7Vn35c18lwmO7Eu92s2wCwrhVrYW_7ItKccARqaAvX-1O2yOvr1MW0vMjPnXM3pyQj5S7byBCygU0YbuA', price: 3500 },
      { name: 'M4A1-S | Printstream', image: 'https://community.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhz2v_Nfz5H_uO1gb-GwqKfq-nsNqjZq-NUw-3Fo92i2AHiqEQ-ZG-hJ4-Qd1RsZAzTqFjokfLv1Me-uZ6cmWp9w7worw', price: 12000 },
      { name: 'AWP | Asiimov', image: 'https://community.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FBRw7PLfYQJS9dCokZOFnPSkarnAwG9U6MBOhuDG_Zi7jQO3-UI4am30cY_DelNsZAvW-FS5yei4jZO9uZ_JzWwj5Hc', price: 8900 },
      { name: 'USP-S | Cortex', image: 'https://community.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpoo6m0FFNhws_GazsS59C5m5GP2vH3NqnJhm5D-cBOhuDG_Zi7jAO3r0dqa3b0d4WRJ1U3aQvTrFm8wOrphJW_vc6aznBruHch', price: 2200 }
    ];

    function renderPrices() {
      pricesBody.innerHTML = skinsMarket.map(s => {
        const change = (Math.random() * 200 - 100).toFixed(0);
        const color = change >= 0 ? 'price-up' : 'price-down';
        return `<tr>
          <td><img src="${s.image}" style="width:32px; height:32px; vertical-align:middle;"> ${s.name}</td>
          <td>Field-Tested</td>
          <td class="${color}">₽ ${(s.price + parseInt(change)).toFixed(0)}</td>
        </tr>`;
      }).join('');
    }
    renderPrices();
    setInterval(renderPrices, 5000);

    // ========== Команды ==========
    const teamList = document.getElementById('teamList');
    function renderTeams() {
      teamList.innerHTML = teams.map(t => `
        <div class="team-card">
          <div><strong>${t.name}</strong> (${t.members} игроков)</div>
          <button class="btn" onclick="tg.showAlert('Приглашение отправлено (симуляция)')">Войти</button>
        </div>
      `).join('');
    }
    renderTeams();

    document.getElementById('createTeamBtn').addEventListener('click', () => {
      document.getElementById('createTeamForm').style.display = 'block';
    });
    document.getElementById('saveTeamBtn').addEventListener('click', () => {
      const name = document.getElementById('teamNameInput').value.trim();
      if (!name) return;
      teams.push({ name, members: 1 });
      save('teams', teams);
      document.getElementById('teamNameInput').value = '';
      document.getElementById('createTeamForm').style.display = 'none';
      renderTeams();
      tg.showAlert('Команда создана!');
    });

    // ========== Матчи ==========
    const playersSlider = document.getElementById('playersSlider');
    const playersCountLabel = document.getElementById('playersCountLabel');
    const matchList = document.getElementById('matchList');
    playersSlider.addEventListener('input', () => playersCountLabel.textContent = playersSlider.value);

    function renderMatches() {
      const allMatches = [...myMatches, ...globalMatches];
      matchList.innerHTML = allMatches.map((m, i) => `
        <div class="match-card">
          <div>ID: ${m.id} | ${m.players}/${m.maxPlayers} | ₽${m.bet} ${m.status==='finished'?'✅':''}</div>
          <button class="btn match-detail-btn" data-index="${i}" data-source="${i < myMatches.length ? 'my' : 'global'}">Детали</button>
        </div>
      `).join('');
      document.querySelectorAll('.match-detail-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const source = e.target.dataset.source;
          const index = parseInt(e.target.dataset.index);
          if (source === 'my') showMatchDetails(index);
          else tg.showAlert('Это демо-матч. Для реальной игры нужен сервер.');
        });
      });
    }

    document.getElementById('createMatchBtn').addEventListener('click', () => {
      const max = parseInt(playersSlider.value);
      const bet = parseInt(document.getElementById('betAmountInput').value);
      if (!bet || bet <= 0) { tg.showAlert('Введите корректную ставку'); return; }
      if (balance < bet) { tg.showAlert('Недостаточно средств'); return; }
      changeBalance(-bet);
      const match = { id: Date.now() % 100000, maxPlayers: max, players: 1, bet, status: 'active' };
      myMatches.push(match);
      save('matches', myMatches);
      renderMatches();
      tg.showAlert('Матч создан!');
    });

    let selectedMatchIndex = null;
    function showMatchDetails(index) {
      const match = myMatches[index];
      if (!match) return;
      selectedMatchIndex = index;
      document.getElementById('matchDetailsTitle').textContent = `Матч #${match.id}`;
      document.getElementById('matchDetailsInfo').innerHTML = `
        Статус: ${match.status}<br>
        Участников: ${match.players}/${match.maxPlayers}<br>
        Ставка: ₽${match.bet}
      `;
      document.getElementById('matchActions').style.display = match.status === 'active' ? 'block' : 'none';
      document.getElementById('sendVideoBtn').style.display = match.status === 'finished' ? 'block' : 'none';
      document.getElementById('matchDetailsModal').style.display = 'flex';
    }

    document.getElementById('finishMatchBtn').addEventListener('click', () => {
      if (selectedMatchIndex === null) return;
      myMatches[selectedMatchIndex].status = 'finished';
      save('matches', myMatches);
      renderMatches();
      showMatchDetails(selectedMatchIndex);
    });
    document.getElementById('cancelMatchBtn').addEventListener('click', () => {
      if (selectedMatchIndex === null) return;
      const match = myMatches[selectedMatchIndex];
      if (match.status === 'finished') return;
      changeBalance(match.bet);
      myMatches.splice(selectedMatchIndex, 1);
      save('matches', myMatches);
      renderMatches();
      document.getElementById('matchDetailsModal').style.display = 'none';
    });
    document.getElementById('sendVideoBtn').addEventListener('click', () => {
      tg.openTelegramLink('https://t.me/VGNprod');
    });
    document.getElementById('closeMatchDetailsBtn').addEventListener('click', () => {
      document.getElementById('matchDetailsModal').style.display = 'none';
    });

    renderMatches();

    // ========== Промокоды ==========
    const promoCodes = { 'VANGUARD2026': 300, 'SKINUP': 150, 'START': 100 };
    let usedPromos = load('usedPromos', []);
    document.getElementById('activatePromoBtn').addEventListener('click', () => {
      const code = document.getElementById('promoCodeInput').value.trim().toUpperCase();
      const msg = document.getElementById('promoMessage');
      if (!code) { msg.textContent = 'Введите код'; msg.style.color = '#ff453a'; return; }
      if (usedPromos.includes(code)) { msg.textContent = 'Уже использован'; msg.style.color = '#ff453a'; return; }
      if (promoCodes[code]) {
        changeBalance(promoCodes[code]);
        usedPromos.push(code);
        save('usedPromos', usedPromos);
        msg.textContent = `Получено ${promoCodes[code]} ₽`;
        msg.style.color = '#34c759';
      } else {
        msg.textContent = 'Неверный код';
        msg.style.color = '#ff453a';
      }
    });

    // ========== Пополнение ==========
    document.getElementById('addBalanceBtn').addEventListener('click', () => {
      document.getElementById('topupModal').style.display = 'flex';
    });
    document.getElementById('closeTopupBtn').addEventListener('click', () => {
      document.getElementById('topupModal').style.display = 'none';
    });
    document.querySelectorAll('.topup-amount').forEach(btn => {
      btn.addEventListener('click', () => {
        changeBalance(parseInt(btn.dataset.amount));
        document.getElementById('topupModal').style.display = 'none';
      });
    });

    // ========== Профиль ==========
    const nicknameInput = document.getElementById('nicknameInput');
    const nicknameStatus = document.getElementById('nicknameStatus');
    const tradeLinkInput = document.getElementById('tradeLinkInput');
    const steamTradeBtn = document.getElementById('steamTradeBtn');

    function loadProfile() {
      profile = load('profile', { nickname: '', tradeLink: '' });
      nicknameInput.value = profile.nickname || '';
      tradeLinkInput.value = profile.tradeLink || '';
      if (profile.tradeLink) {
        steamTradeBtn.href = profile.tradeLink;
        steamTradeBtn.style.display = 'inline-block';
      } else {
        steamTradeBtn.style.display = 'none';
      }
    }
    loadProfile();

    document.getElementById('saveNicknameBtn').addEventListener('click', () => {
      const nick = nicknameInput.value.trim();
      if (!nick) { nicknameStatus.textContent = 'Введите ник'; return; }
      if (profile.nickname && profile.nickname !== nick) {
        // освобождаем старый
        takenNicknames = takenNicknames.filter(n => n !== profile.nickname.toLowerCase());
      }
      if (isNicknameTaken(nick) && nick !== profile.nickname) {
        nicknameStatus.textContent = 'Этот ник занят!';
        nicknameStatus.style.color = '#ff453a';
      } else {
        if (profile.nickname !== nick) registerNickname(nick);
        profile.nickname = nick;
        save('profile', profile);
        nicknameStatus.textContent = 'Ник сохранён!';
        nicknameStatus.style.color = '#34c759';
        loadProfile();
      }
    });

    document.getElementById('saveTradeLinkBtn').addEventListener('click', () => {
      const link = tradeLinkInput.value.trim();
      const valid = link.startsWith('https://steamcommunity.com/tradeoffer/new/?partner=');
      if (!valid) {
        tg.showAlert('Некорректная трейд-ссылка. Пример: https://steamcommunity.com/tradeoffer/new/?partner=123456&token=abc');
        return;
      }
      profile.tradeLink = link;
      save('profile', profile);
      tg.showAlert('Трейд-ссылка сохранена!');
      loadProfile();
    });

    // Инвентарь
    const inventoryList = document.getElementById('inventoryList');
    function updateInventoryUI() {
      inventoryList.innerHTML = inventory.map((item, idx) => `
        <div class="item-card">
          <img src="${item.image}" alt="${item.name}" style="width:48px; height:48px; object-fit:contain;">
          <div style="flex:1; margin-left:8px;">
            <div style="font-weight:600;">${item.name}</div>
            <div style="color:#4A90E2;">₽ ${item.price}</div>
          </div>
          <div style="display:flex; gap:4px;">
            <button class="btn sell-item-btn" data-index="${idx}">Продать</button>
            <button class="btn withdraw-item-btn" data-index="${idx}" style="background: rgba(255,255,255,0.05);">Вывести</button>
          </div>
        </div>
      `).join('');
      document.querySelectorAll('.sell-item-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(e.target.dataset.index);
          const item = inventory[idx];
          changeBalance(item.price);
          inventory.splice(idx, 1);
          save('inventory', inventory);
          updateInventoryUI();
          tg.showAlert(`${item.name} продан за ₽${item.price}`);
        });
      });
      document.querySelectorAll('.withdraw-item-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          if (!profile.tradeLink) {
            tg.showAlert('Сначала сохраните трейд-ссылку в профиле!');
            return;
          }
          tg.openLink(profile.tradeLink);
        });
      });
    }
    updateInventoryUI();

    // Закрытие модалок по оверлею
    window.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-overlay')) e.target.style.display = 'none';
    });
  </script>
</body>
</html>
