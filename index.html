<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>VANGUARD | Кейсы и Апгрейд</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            padding: 16px;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #4A90E2;
        }
        .balance-block {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .balance {
            font-weight: 600;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .add-balance-btn {
            background: rgba(74, 144, 226, 0.2);
            border: 1px solid rgba(74, 144, 226, 0.4);
            color: #4A90E2;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-balance-btn:active {
            transform: scale(0.9);
            background: rgba(74, 144, 226, 0.4);
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .tabs::-webkit-scrollbar {
            display: none;
        }
        .tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.7);
        }
        .tab.active {
            background: rgba(74, 144, 226, 0.2);
            border-color: rgba(74, 144, 226, 0.4);
            color: #fff;
            font-weight: 600;
        }
        .section {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .section.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .case-category-title {
            font-size: 16px;
            font-weight: 700;
            margin: 16px 0 8px;
            color: #4A90E2;
            text-transform: uppercase;
            letter-spacing: 1px;
            grid-column: 1 / -1;
        }
        .cases-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .case-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
        }
        .case-card:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.06);
        }
        .case-image {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .case-name {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 13px;
        }
        .case-price {
            color: #4A90E2;
            font-weight: 500;
            font-size: 13px;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            overflow-y: auto;
        }
        .modal-fullscreen {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background: rgba(20, 20, 20, 0.97);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: none;
            border-radius: 0;
            padding: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .modal {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .case-roulette {
            position: relative;
            width: 100%;
            height: 100px;
            overflow: hidden;
            margin: 16px 0;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            touch-action: pan-y;
        }
        .roulette-track {
            display: flex;
            gap: 0;
            position: absolute;
            left: 50%;
            transform: translateX(calc(-50% + 0px));
            transition: none;
            will-change: transform;
        }
        .roulette-item {
            flex: 0 0 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }
        .roulette-item img {
            max-height: 64px;
            max-width: 64px;
            object-fit: contain;
            border-radius: 6px;
        }
        .roulette-center-marker {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: #4A90E2;
            box-shadow: 0 0 16px #4A90E2;
            z-index: 2;
            border-radius: 2px;
            opacity: 0.7;
        }
        .mini-roulettes-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            width: 100%;
            margin: 12px 0;
        }
        .mini-roulette-container {
            width: 180px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .mini-roulette {
            width: 100%;
            height: 60px;
            overflow: hidden;
            position: relative;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .mini-roulette .roulette-track {
            left: 50%;
            transform: translateX(calc(-50% + 0px));
        }
        .mini-roulette .roulette-item {
            flex: 0 0 50px;
            height: 50px;
        }
        .mini-roulette .roulette-item img {
            max-height: 40px;
            max-width: 40px;
        }
        .mini-roulette .roulette-center-marker {
            width: 3px;
        }
        .mini-result {
            margin-top: 6px;
            font-size: 11px;
            font-weight: 600;
            min-height: 20px;
        }
        .btn {
            background: rgba(74, 144, 226, 0.15);
            border: 1px solid rgba(74, 144, 226, 0.3);
            color: #fff;
            border-radius: 14px;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
            margin: 6px 0;
            display: inline-block;
            user-select: none;
        }
        .btn:active {
            background: rgba(74, 144, 226, 0.3);
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .btn-block {
            display: block;
            width: 100%;
        }
        .btn-success {
            background: rgba(52, 199, 89, 0.15);
            border-color: rgba(52, 199, 89, 0.3);
        }
        .btn-gold {
            background: rgba(255, 215, 0, 0.15);
            border-color: rgba(255, 215, 0, 0.3);
        }
        .input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 12px;
            color: #fff;
            width: 100%;
            margin: 6px 0;
            outline: none;
            font-size: 14px;
        }
        .input:focus {
            border-color: #4A90E2;
        }
        .rarity-blue { background: linear-gradient(135deg, #4B69FF, #2563EB); }
        .rarity-purple { background: linear-gradient(135deg, #8847FF, #7C3AED); }
        .rarity-pink { background: linear-gradient(135deg, #D32CE6, #A21CAF); }
        .rarity-red { background: linear-gradient(135deg, #EB4B4B, #DC2626); }
        .rarity-gold { background: linear-gradient(135deg, #FFD700, #B8860B); }
        .rarity-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            margin-left: 8px;
        }
        .upgrade-result-banner {
            font-size: 18px;
            font-weight: 700;
            padding: 12px 20px;
            border-radius: 16px;
            text-align: center;
            margin: 8px 0;
            width: 100%;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .upgrade-result-banner.show {
            opacity: 1;
            transform: scale(1);
        }
        .upgrade-result-banner.success {
            background: rgba(52, 199, 89, 0.15);
            border: 1px solid rgba(52, 199, 89, 0.3);
            color: #34c759;
        }
        .upgrade-result-banner.fail {
            background: rgba(255, 69, 58, 0.15);
            border: 1px solid rgba(255, 69, 58, 0.3);
            color: #ff453a;
        }
        .upgrade-container { display: flex; flex-direction: column; align-items: center; }
        .wheel-wrapper { position: relative; width: 220px; height: 220px; margin: 20px auto; }
        .wheel-canvas { display: block; position: absolute; top: 0; left: 0; width: 220px; height: 220px; border-radius: 50%; box-shadow: 0 0 30px rgba(74,144,226,0.15), 0 0 60px rgba(0,0,0,0.6); }
        .wheel-arrow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(0deg) translateY(100px); width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-bottom: 24px solid #fff; filter: drop-shadow(0 0 8px rgba(74,144,226,0.6)); z-index: 5; transition: none; transform-origin: center center; }
        .upgrade-columns { display: flex; gap: 12px; width: 100%; margin: 12px 0; }
        .upgrade-col { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 10px; display: flex; flex-direction: column; gap: 6px; min-height: 120px; max-height: 200px; overflow-y: auto; }
        .upgrade-col h4 { text-align: center; margin-bottom: 4px; font-size: 13px; opacity: 0.7; flex-shrink: 0; }
        .upgrade-card { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.06); border-radius: 10px; padding: 6px 8px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; font-size: 11px; flex-shrink: 0; }
        .upgrade-card img { width: 32px; height: 32px; object-fit: contain; border-radius: 4px; flex-shrink: 0; }
        .upgrade-card.selected { border-color: #4A90E2; background: rgba(74,144,226,0.2); }
        .chance-badge { margin-left: auto; font-size: 10px; background: rgba(0,0,0,0.4); padding: 2px 8px; border-radius: 10px; flex-shrink: 0; }
        .case-contents { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 12px 0; max-width: 400px; width: 100%; }
        .case-item-card { width: 80px; background: rgba(255, 255, 255, 0.06); border-radius: 10px; padding: 6px; text-align: center; font-size: 10px; backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.04); }
        .case-item-card img { width: 52px; height: 52px; object-fit: contain; margin-bottom: 2px; border-radius: 4px; }
        .item-label { font-size: 9px; opacity: 0.9; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-price-tag { font-size: 9px; color: #4A90E2; font-weight: 600; }
        .inventory-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
        .item-card { display: flex; align-items: center; background: rgba(255, 255, 255, 0.04); border-radius: 14px; padding: 8px 12px; border: 1px solid rgba(255, 255, 255, 0.06); gap: 10px; position: relative; }
        .item-card img { width: 40px; height: 40px; object-fit: contain; border-radius: 6px; flex-shrink: 0; }
        .item-card.withdraw-pending img { filter: blur(3px) grayscale(0.5); }
        .item-card .withdraw-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); border-radius: 14px; font-size: 12px; font-weight: 700; color: #fff; }
        .item-card .item-info { flex: 1; min-width: 0; }
        .item-card .item-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-card .item-price { font-size: 12px; opacity: 0.7; }
        .item-card .item-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .item-card .item-actions .btn { padding: 4px 12px; font-size: 11px; margin: 0; }
        .drop-progress-wrap { width: 100%; background: rgba(255,255,255,0.06); border-radius: 10px; height: 6px; margin: 8px 0 4px; overflow: hidden; }
        .drop-progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #4A90E2, #34c759); border-radius: 10px; transition: width 0.15s linear; }
        .drop-progress-label { font-size: 11px; opacity: 0.6; text-align: center; margin-top: 2px; }
        .flex-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .text-center { text-align: center; }
        .mt-8 { margin-top: 8px; }
        .mb-8 { margin-bottom: 8px; }
        .close-btn-corner {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }
        .quantity-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 10px 0;
        }
        .quantity-btn {
            padding: 8px 16px;
            font-size: 16px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }
        .quantity-btn.active {
            background: rgba(74,144,226,0.3);
            border-color: #4A90E2;
        }
        .fast-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            justify-content: center;
        }
        .fast-btn {
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            color: #FFD700;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }
        .fast-btn.active {
            background: rgba(255,215,0,0.3);
            border-color: #FFD700;
        }
        @media (max-width: 480px) {
            .modal-fullscreen { padding: 12px; }
            .wheel-wrapper { width: 180px; height: 180px; }
            .wheel-canvas { width: 180px; height: 180px; }
            .wheel-arrow { transform: translate(-50%, -50%) rotate(0deg) translateY(80px); border-left-width: 12px; border-right-width: 12px; border-bottom-width: 20px; }
            .roulette-item { flex: 0 0 64px; height: 64px; }
            .roulette-item img { max-height: 52px; max-width: 52px; }
            .mini-roulette-container { width: 150px; }
            .mini-roulette .roulette-item { flex: 0 0 40px; height: 40px; }
            .mini-roulette .roulette-item img { max-height: 30px; max-width: 30px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">VANGUARD</div>
        <div class="balance-block">
            <div class="balance" id="balanceDisplay">₽ 1000</div>
            <div class="add-balance-btn" id="addBalanceBtn">+</div>
        </div>
    </div>
    <div class="tabs" id="tabsContainer">
        <button class="tab active" data-section="cases">Кейсы</button>
        <button class="tab" data-section="upgrade">Апгрейд</button>
        <button class="tab" data-section="profile">Профиль</button>
        <button class="tab" data-section="promo">Промокоды</button>
    </div>

    <div id="section-cases" class="section active">
        <div class="glass-panel" style="margin-bottom:12px;"><h3>Выберите кейс</h3></div>
        <div class="cases-grid" id="casesContainer"></div>
    </div>

    <div id="section-upgrade" class="section">
        <div class="glass-panel"><h3>Апгрейд скинов</h3><p style="font-size:12px; color:rgba(255,255,255,0.5);">Выберите скин и цель (шанс до 80%)</p></div>
        <div class="upgrade-container">
            <div class="wheel-wrapper" id="wheelWrapper">
                <canvas id="wheelCanvas" class="wheel-canvas" width="220" height="220"></canvas>
                <div class="wheel-arrow" id="wheelArrow"></div>
            </div>
            <div class="upgrade-columns">
                <div class="upgrade-col"><h4>🎒 Ваш скин</h4><div id="upgradeSourceList"></div></div>
                <div class="upgrade-col"><h4>🎯 Цель</h4><div id="upgradeTargetList"></div></div>
            </div>
            <div id="upgradeChanceDisplay" style="text-align:center; margin:4px 0; font-weight:600; font-size:15px;"></div>
            <div class="fast-toggle">
                <button class="fast-btn" id="upgradeFastBtn">⚡ Быстро</button>
            </div>
            <button class="btn btn-block" id="startUpgradeBtn" disabled>🔧 Апгрейд</button>
            <div id="upgradeResultText" style="text-align:center; margin-top:8px;"></div>
        </div>
    </div>

    <div id="section-profile" class="section">
        <div class="glass-panel">
            <h3>Профиль</h3>
            <div style="margin:8px 0;"><label>Никнейм:</label><div style="display:flex; gap:8px;"><input class="input" id="nicknameInput" placeholder="Введите ник" /><button class="btn" id="saveNicknameBtn">Сохранить</button></div><div id="nicknameStatus" style="font-size:12px; margin-top:4px;"></div></div>
            <div style="margin:16px 0;"><label>Trade-ссылка CS:GO:</label><input class="input" id="tradeLinkInput" placeholder="https://steamcommunity.com/tradeoffer/new/?partner=..." /><button class="btn" id="saveTradeLinkBtn" style="margin-top:4px;">Сохранить</button><a id="steamTradeBtn" class="btn" style="display:none; margin-top:8px; text-decoration:none;" target="_blank">🔗 Перейти к трейду</a></div>
        </div>
        <div class="glass-panel"><h3>Инвентарь</h3><div class="inventory-list" id="inventoryList"></div><p style="color:rgba(255,255,255,0.3); margin-top:8px; font-size:12px;">Продажа или вывод в трейд</p></div>
    </div>

    <div id="section-promo" class="section">
        <div class="glass-panel">
            <h3>Промокод</h3>
            <input class="input" id="promoInput" placeholder="Введите код" />
            <button class="btn btn-block" id="applyPromoBtn">Активировать</button>
            <div id="promoStatus" style="margin-top:8px; font-size:14px;"></div>
        </div>
    </div>

    <!-- Админ-панель -->
    <div id="section-admin" class="section">
        <div class="glass-panel">
            <h3>Админ-панель</h3>
            <div style="margin:12px 0;">
                <label>Подкрутка (удача) : <span id="boostStatus">выкл</span></label>
                <button class="btn" id="toggleBoostBtn">Включить подкрутку</button>
            </div>
            <div style="margin:12px 0;">
                <label>Изменить баланс (введите +сумма или -сумма):</label>
                <div style="display:flex; gap:8px; align-items:center;">
                    <input class="input" type="text" id="adminBalanceInput" placeholder="+1000 или -500" style="flex:1;" />
                    <button class="btn" id="adminApplyBalanceBtn">Применить</button>
                </div>
            </div>
            <div style="margin:16px 0;">
                <h4>Запросы на вывод</h4>
                <div id="withdrawRequestsList"></div>
            </div>
        </div>
    </div>

    <!-- CASE MODAL -->
    <div id="caseModal" class="modal-overlay" style="display:none;">
        <div class="modal-fullscreen">
            <button class="close-btn-corner" id="closeCaseBtnCorner">✕</button>
            <h3 id="caseModalTitle" style="margin-bottom:4px;">Кейс</h3>
            <div class="case-roulette" id="rouletteContainer" style="display:none;">
                <div class="roulette-track" id="rouletteTrack"></div>
                <div class="roulette-center-marker"></div>
            </div>
            <div class="mini-roulettes-grid" id="miniRoulettesGrid" style="display:none;"></div>
            <div class="drop-progress-wrap"><div class="drop-progress-bar" id="dropProgressBar"></div></div>
            <div id="dropProgressLabel" class="drop-progress-label">🎯 Готов к открытию</div>
            <div id="caseResultText" style="font-weight:600; min-height:28px; margin:4px 0;"></div>

            <!-- Кнопки выбора количества -->
            <div class="quantity-btns" id="quantityBtns">

                { name: 'only M4A1', price: 34, image: 'https://github.com/mihailreva78-png/vanguardCS/blob/main/case_onlyM4A1.png?raw=true', category: 'Кейсы по оружиям', items: [ { name: 'M4A1 | Bright Water', image: skinImages['M4A1 | Bright Water'], price: 200, rarity: 'blue' } ] },
                { name: 'only M4A1-S', price: 29, image: 'https://github.com/mihailreva78-png/vanguardCS/blob/main/case_onlyM4A1-S.png?raw=true', category: 'Кейсы по оружиям', items: [ { name: 'M4A1-S | Emphorosaur-S', image: skinImages['M4A1-S | Emphorosaur-S'], price: 280, rarity: 'pink' }, { name: 'M4A1-S | Printstream', image: skinImages['M4A1-S | Printstream'], price: 270, rarity: 'pink' } ] },

                { name: 'ORDINARY', price: 19, image: 'https://github.com/mihailreva78-png/vanguardCS/blob/main/case_ORDINARY.png?raw=true', category: 'Фирменные кейсы', items: [ { name: 'M4A1 | Bright Water', image: skinImages['M4A1 | Bright Water'], price: 200, rarity: 'blue' }, { name: 'M4A1-S | Printstream', image: skinImages['M4A1-S | Printstream'], price: 270, rarity: 'pink' } ] },
                { name: 'UNUSUAL', price: 99, image: 'https://github.com/mihailreva78-png/vanguardCS/blob/main/case_UNUSUAL.png?raw=true', category: 'Фирменные кейсы', items: [ { name: 'Desert Eagle | Midnight', image: skinImages['Desert Eagle | Midnight'], price: 310, rarity: 'purple' }, { name: 'USP-S | Cortex', image: skinImages['USP-S | Cortex'], price: 450, rarity: 'purple' } ] },
                { name: 'LEGENDARY', price: 999, image: 'https://github.com/mihailreva78-png/vanguardCS/blob/main/case_LEGENDARY.png?raw=true', category: 'Фирменные кейсы', items: [ { name: 'AWP | Duality', image: skinImages['AWP | Duality'], price: 1200, rarity: 'red' }, { name: 'AK-47 | Redline', image: skinImages['AK-47 | Redline'], price: 350, rarity: 'red' } ] },
                { name: 'MYTHICAL', price: 2700, image: 'https://github.com/mihailreva78-png/vanguardCS/blob/main/case_MYTHICAL.png?raw=true', category: 'Фирменные кейсы', items: [ { name: 'AWP | Dragon Lore', image: skinImages['AWP | Dragon Lore'], price: 5000, rarity: 'gold' } ] }
            ];

            function createImg(src, alt, className) { const img = document.createElement('img'); img.src = src; img.alt = alt || ''; if (className) img.className = className; img.onerror = () => img.src = fallbackSkinImg; return img; }
            function getRarityClass(rarity) { return 'rarity-' + rarity; }

            function showSection(sectionId) {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                const el = document.getElementById('section-' + sectionId);
                if (el) el.classList.add('active');
                if (sectionId === 'profile') updateInventoryUI();
                if (sectionId === 'upgrade') refreshUpgradeTab();
                if (sectionId === 'admin') updateAdminPanelUI();
            }
            document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                showSection(tab.dataset.section);
            }));

            const casesContainer = document.getElementById('casesContainer');
            function renderCases() {
                let html = '', lastCategory = '';
                cases.forEach((c, idx) => {
                    if (c.category !== lastCategory) { html += `<div class="case-category-title">${c.category}</div>`; lastCategory = c.category; }
                    html += `<div class="case-card" data-index="${idx}"><img src="${c.image}" alt="${c.name}" class="case-image" onerror="this.src='${fallbackSkinImg}'" /><div class="case-name">${c.name}</div><div class="case-price">${c.price} ₽</div></div>`;
                });
                casesContainer.innerHTML = html;
                document.querySelectorAll('.case-card').forEach(card => card.addEventListener('click', () => { if (isCaseOpening) return; showCaseModal(parseInt(card.dataset.index)); }));
            }
            renderCases();

            const caseModal = document.getElementById('caseModal');
            const rouletteTrack = document.getElementById('rouletteTrack');
            const caseResultText = document.getElementById('caseResultText');
            const openCaseBtn = document.getElementById('openCaseBtn');
            const caseContentsContainer = document.getElementById('caseContentsContainer');
            const closeCaseBtn = document.getElementById('closeCaseBtnCorner');
            const againCaseBtn = document.getElementById('againCaseBtn');
            const sellAllBtn = document.getElementById('sellAllBtn');
            const postOpenActions = document.getElementById('postOpenActions');
            const dropProgressBar = document.getElementById('dropProgressBar');
            const dropProgressLabel = document.getElementById('dropProgressLabel');
            const caseModalTitle = document.getElementById('caseModalTitle');
            const miniRoulettesGrid = document.getElementById('miniRoulettesGrid');
            const mainRoulette = document.getElementById('rouletteContainer');
            const caseFastBtn = document.getElementById('caseFastBtn');

            let caseOpenCount = 1;
            let caseResults = [];
            let animCompletedCount = 0;

            // Переключение быстрого режима для кейсов
            caseFastBtn.addEventListener('click', () => {
                fastMode = !fastMode;
                caseFastBtn.classList.toggle('active', fastMode);
                document.getElementById('upgradeFastBtn').classList.toggle('active', fastMode);
            });

            const quantityBtns = document.getElementById('quantityBtns');
            quantityBtns.addEventListener('click', (e) => {
                if (e.target.classList.contains('quantity-btn')) {
                    document.querySelectorAll('.quantity-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    caseOpenCount = parseInt(e.target.dataset.qty);
                    if (currentCaseIdx !== null) {
                        const caseData = cases[currentCaseIdx];
                        openCaseBtn.textContent = `Открыть ${caseOpenCount} за ${caseData.price * caseOpenCount} ₽`;
                        renderCaseLayout();
                    }
                }
            });

            function renderCaseLayout() {
                const items = cases[currentCaseIdx].items;
                if (caseOpenCount === 1) {
                    mainRoulette.style.display = 'flex';
                    miniRoulettesGrid.style.display = 'none';
                    rouletteTrack.innerHTML = items.map(i => `<div class="roulette-item">${createImg(i.image, i.name).outerHTML}</div>`).join('');
                    rouletteTrack.style.transform = 'translateX(calc(-50% + 0px))';
                } else {
                    mainRoulette.style.display = 'none';
                    miniRoulettesGrid.style.display = 'flex';
                    let html = '';
                    for (let i = 0; i < caseOpenCount; i++) {
                        html += `<div class="mini-roulette-container" id="miniCont${i}">
                            <div class="mini-roulette" id="miniRoulette${i}">
                                <div class="roulette-track" id="miniTrack${i}">${items.map(it => `<div class="roulette-item">${createImg(it.image, it.name).outerHTML}</div>`).join('')}</div>
                                <div class="roulette-center-marker"></div>
                            </div>
                            <div class="mini-result" id="miniResult${i}">—</div>
                            <button class="btn sell-single-btn" data-index="${i}" style="display:none; margin-top:4px; font-size:11px;">Продать</button>
                        </div>`;
                    }
                    miniRoulettesGrid.innerHTML = html;
                }
            }

            function showCaseModal(caseIdx) {
                currentCaseIdx = caseIdx;
                const caseData = cases[caseIdx];
                caseModalTitle.textContent = caseData.name;
                caseContentsContainer.innerHTML = caseData.items.map(item => `<div class="case-item-card ${getRarityClass(item.rarity)}">${createImg(item.image, item.name).outerHTML}<div class="item-label">${item.name}</div><div class="item-price-tag">₽${item.price}</div></div>`).join('');
                openCaseBtn.textContent = `Открыть ${caseOpenCount} за ${caseData.price * caseOpenCount} ₽`;
                openCaseBtn.disabled = false;
                postOpenActions.style.display = 'none';
                caseResultText.innerHTML = '';
                dropProgressBar.style.width = '0%';
                dropProgressLabel.textContent = '🎯 Готов к открытию';
                caseResults = [];
                animCompletedCount = 0;
                renderCaseLayout();
                caseModal.style.display = 'flex';
                isCaseOpening = false;
            }

            // Анимация рулетки с остановкой в диапазоне 60-85%
            function animateRoulette(containerId, trackId, items, selectedItem, durationMs, callback) {
                const track = document.getElementById(trackId);
                const container = document.getElementById(containerId);
                const itemWidth = container.classList.contains('mini-roulette') ? 50 : 80;
                const repeatCount = 150;
                const repeated = [];
                for (let i = 0; i < repeatCount; i++) repeated.push(...items);
                track.innerHTML = repeated.map(item => `<div class="roulette-item">${createImg(item.image, item.name).outerHTML}</div>`).join('');
                const totalItems = repeated.length;
                // Находим все индексы выбранного предмета
                const allIndices = [];
                for (let i = 0; i < totalItems; i++) {
                    if (repeated[i].name === selectedItem.name) allIndices.push(i);
                }
                if (allIndices.length === 0) { if (callback) callback(); return; }
                // Выбираем индекс в диапазоне 60% - 85% от общей длины
                const minIdx = Math.floor(totalItems * 0.6);
                const maxIdx = Math.floor(totalItems * 0.85);
                let targetIdx = allIndices.find(idx => idx >= minIdx && idx <= maxIdx);
                if (targetIdx === undefined) {
                    // если нет в диапазоне, берем ближайший к середине диапазона
                    const midRange = (minIdx + maxIdx) / 2;
                    targetIdx = allIndices.reduce((prev, curr) => Math.abs(curr - midRange) < Math.abs(prev - midRange) ? curr : prev);
                }
                const targetOffset = (targetIdx * itemWidth + itemWidth/2) - (totalItems * itemWidth) / 2;
                const jitter = (Math.random() - 0.5) * 8;
                const finalOffset = targetOffset + jitter;
                const startTime = performance.now();
                function step(now) {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / durationMs, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    const currentOffset = finalOffset * eased;
                    track.style.transform = `translateX(calc(-50% + ${currentOffset}px))`;
                    if (progress < 1) {
                        requestAnimationFrame(step);
                    } else {
                        track.style.transform = `translateX(calc(-50% + ${finalOffset}px))`;
                        if (callback) callback();
                    }
                }
                requestAnimationFrame(step);
            }

            function removeInventoryItem(name, price) {
                const idx = inventory.findIndex(s => s.name === name && s.price === price && !s.withdrawStatus);
                if (idx !== -1) { inventory.splice(idx, 1); return true; }
                return false;
            }

            function getWeightedRandomItem(items) {
                if (!isAdmin || !adminBoost) {
                    return items[Math.floor(Math.random() * items.length)];
                }
                const sorted = [...items].sort((a, b) => b.price - a.price);
                const half = Math.ceil(sorted.length / 2);
                const topHalf = sorted.slice(0, half);
                const bottomHalf = sorted.slice(half);
                if (Math.random() < 0.7 && topHalf.length > 0) {
                    return topHalf[Math.floor(Math.random() * topHalf.length)];
                } else {
                    return bottomHalf.length > 0 ? bottomHalf[Math.floor(Math.random() * bottomHalf.length)] : topHalf[0];
                }
            }

            function performCaseOpening() {
                if (isCaseOpening || currentCaseIdx === null) return;
                const caseData = cases[currentCaseIdx];
                const totalCost = caseData.price * caseOpenCount;
                if (balance < totalCost) { tg.showAlert('Недостаточно средств!'); return; }
                changeBalance(-totalCost);
                isCaseOpening = true;
                openCaseBtn.disabled = true;
                postOpenActions.style.display = 'none';
                caseResultText.innerHTML = '';
                dropProgressBar.style.width = '0%';
                dropProgressLabel.textContent = '🎰 Открываем...';

                const items = caseData.items;
                caseResults = [];
                for (let i = 0; i < caseOpenCount; i++) {
                    const selected = getWeightedRandomItem(items);
                    caseResults.push({ ...selected, index: i, sold: false });
                    inventory.push({ ...selected, withdrawStatus: null });
                }
                save('inventory', inventory);
                updateInventoryUI();

                if (caseOpenCount === 1) {
                    mainRoulette.style.display = 'flex';
                    miniRoulettesGrid.style.display = 'none';
                } else {
                    mainRoulette.style.display = 'none';
                    miniRoulettesGrid.style.display = 'flex';
                }

                animCompletedCount = 0;
                const total = caseOpenCount;
                const duration = fastMode ? 1000 : 7000;

                function onAnimComplete(index, selected) {
                    animCompletedCount++;
                    const progress = (animCompletedCount / total) * 100;
                    dropProgressBar.style.width = progress + '%';
                    dropProgressLabel.textContent = `🎯 ${animCompletedCount}/${total}`;

                    if (caseOpenCount === 1) {
                        const resDiv = caseResultText;
                        resDiv.innerHTML = `🎉 Выпало: <span class="rarity-badge ${getRarityClass(selected.rarity)}">${selected.name}</span>`;
                        const sellBtn = document.createElement('button');
                        sellBtn.className = 'btn btn-success sell-single-btn';
                        sellBtn.textContent = 'Продать за ' + selected.price + '₽';
                        sellBtn.dataset.index = 0;
                        sellBtn.addEventListener('click', () => sellSingleResult(0));
                        resDiv.appendChild(sellBtn);
                        postOpenActions.style.display = 'flex';
                        sellAllBtn.style.display = 'inline-block';
                    } else {
                        const resEl = document.getElementById('miniResult' + index);
                        if (resEl) {
                            resEl.innerHTML = `<span class="rarity-badge ${getRarityClass(selected.rarity)}">${selected.name}</span>`;
                        }
                        const sellBtn = document.querySelector(`.sell-single-btn[data-index="${index}"]`);
                        if (sellBtn) {
                            sellBtn.style.display = 'inline-block';
                            sellBtn.disabled = false;
                            sellBtn.onclick = () => sellSingleResult(index);
                        }
                    }

                    if (animCompletedCount === total) {
                        isCaseOpening = false;
                        dropProgressLabel.textContent = '✅ Все открыты!';
                        if (caseOpenCount > 1) {
                            postOpenActions.style.display = 'flex';
                            sellAllBtn.style.display = 'inline-block';
                        }
                    }
                }

                if (caseOpenCount === 1) {
                    animateRoulette('rouletteContainer', 'rouletteTrack', items, caseResults[0], duration, () => {
                        onAnimComplete(0, caseResults[0]);
                    });
                } else {
                    caseResults.forEach((res, i) => {
                        const containerId = 'miniRoulette' + i;
                        const trackId = 'miniTrack' + i;
                        animateRoulette(containerId, trackId, items, res, duration, () => {
                            onAnimComplete(i, res);
                        });
                    });
                }
            }

            function sellSingleResult(index) {
                const res = caseResults[index];
                if (!res || res.sold) return;
                if (removeInventoryItem(res.name, res.price)) {
                    changeBalance(res.price);
                    save('inventory', inventory);
                    updateInventoryUI();
                    res.sold = true;
                    if (caseOpenCount === 1) {
                        caseResultText.innerHTML += '<br>💰 Продано за ' + res.price + ' ₽';
                        const sellBtns = document.querySelectorAll('.sell-single-btn');
                        sellBtns.forEach(b => b.remove());
                    } else {
                        const sellBtn = document.querySelector(`.sell-single-btn[data-index="${index}"]`);
                        if (sellBtn) sellBtn.style.display = 'none';
                        const resEl = document.getElementById('miniResult' + index);
                        if (resEl) resEl.innerHTML += ' (продан)';
                    }
                }
            }

            function sellAllResults() {
                let totalGain = 0;
                caseResults.forEach(res => {
                    if (!res.sold && removeInventoryItem(res.name, res.price)) {
                        totalGain += res.price;
                        res.sold = true;
                    }
                });
                if (totalGain > 0) {
                    changeBalance(totalGain);
                    save('inventory', inventory);
                    updateInventoryUI();
                    caseResultText.innerHTML += `<br>💰 Продано всё за ${totalGain} ₽`;
                    if (caseOpenCount === 1) {
                        document.querySelectorAll('.sell-single-btn').forEach(b => b.remove());
                    } else {
                        document.querySelectorAll('.sell-single-btn').forEach(b => b.style.display = 'none');
                        caseResults.forEach((_, i) => {
                            const resEl = document.getElementById('miniResult' + i);
                            if (resEl && caseResults[i].sold) resEl.innerHTML += ' (продан)';
                        });
                    }
                    sellAllBtn.style.display = 'none';
                }
            }

            openCaseBtn.addEventListener('click', performCaseOpening);
            againCaseBtn.addEventListener('click', () => {
                if (isCaseOpening) return;
                caseResults = [];
                animCompletedCount = 0;
                dropProgressBar.style.width = '0%';
                dropProgressLabel.textContent = '🎯 Готов к открытию';
                caseResultText.innerHTML = '';
                postOpenActions.style.display = 'none';
                openCaseBtn.disabled = false;
                if (currentCaseIdx !== null) renderCaseLayout();
            });
            sellAllBtn.addEventListener('click', sellAllResults);
            closeCaseBtn.addEventListener('click', () => {
                if (isCaseOpening) return;
                caseModal.style.display = 'none';
                currentCaseIdx = null;
            });

            // ---------- Апгрейд ----------
            let selectedSourceSkin = null, selectedTargetSkin = null, wheelAnimId = null;
            const wheelCanvas = document.getElementById('wheelCanvas');
            const ctx = wheelCanvas.getContext('2d');
            const wheelArrow = document.getElementById('wheelArrow');
            const upgradeFastBtn = document.getElementById('upgradeFastBtn');
            upgradeFastBtn.addEventListener('click', () => {
                fastMode = !fastMode;
                upgradeFastBtn.classList.toggle('active', fastMode);
                caseFastBtn.classList.toggle('active', fastMode);
            });

            function refreshUpgradeTab() {
                renderUpgradeSource();
                selectedTargetSkin = null;
                document.getElementById('upgradeTargetList').innerHTML = '';
                document.getElementById('upgradeChanceDisplay').innerHTML = '';
                document.getElementById('startUpgradeBtn').disabled = true;
                document.getElementById('upgradeResultText').innerHTML = '';
                drawWheel(50);
                wheelArrow.style.transform = 'translate(-50%, -50%) rotate(0deg) translateY(100px)';
            }

            function renderUpgradeSource() {
                const container = document.getElementById('upgradeSourceList');
                const available = inventory.filter(item => !item.withdrawStatus);
                if (available.length === 0) { container.innerHTML = '<p style="opacity:0.4; font-size:12px;">Нет доступных скинов</p>'; return; }
                container.innerHTML = available.map((item, idx) => `<div class="upgrade-card ${getRarityClass(item.rarity||'blue')}" data-index="${idx}">${createImg(item.image, item.name).outerHTML}<div style="flex:1; font-weight:600; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.name}</div><div style="font-size:10px; opacity:0.7;">₽${item.price}</div></div>`).join('');
                document.querySelectorAll('#upgradeSourceList .upgrade-card').forEach(card => card.addEventListener('click', () => {
                    document.querySelectorAll('#upgradeSourceList .upgrade-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    const idx = parseInt(card.dataset.index);
                    selectedSourceSkin = available[idx];
                    renderUpgradeTargets();
                }));
            }

            function renderUpgradeTargets() {
                if (!selectedSourceSkin) return;
                const container = document.getElementById('upgradeTargetList');
                const chanceDisplay = document.getElementById('upgradeChanceDisplay');
                const startBtn = document.getElementById('startUpgradeBtn');
                const validTargets = allSkins.filter(s => s.name !== selectedSourceSkin.name && (Math.round((selectedSourceSkin.price / s.basePrice) * 100) <= 80) && s.basePrice > selectedSourceSkin.price);
                if (validTargets.length === 0) { container.innerHTML = '<p style="opacity:0.4; font-size:12px;">Нет подходящих целей</p>'; startBtn.disabled = true; return; }
                container.innerHTML = validTargets.map(skin => { const chance = Math.round((selectedSourceSkin.price / skin.basePrice) * 100); return `<div class="upgrade-card ${getRarityClass(skin.rarity)}" data-name="${skin.name}">${createImg(skin.image, skin.name).outerHTML}<div style="flex:1; font-weight:600; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${skin.name}</div><span class="chance-badge">${chance}%</span></div>`; }).join('');
                document.querySelectorAll('#upgradeTargetList .upgrade-card').forEach(card => card.addEventListener('click', () => {
                    document.querySelectorAll('#upgradeTargetList .upgrade-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedTargetSkin = validTargets.find(s => s.name === card.dataset.name);
                    const chance = Math.round((selectedSourceSkin.price / selectedTargetSkin.basePrice) * 100);
                    chanceDisplay.innerHTML = `Шанс успеха: <span style="color:#4A90E2; font-size:20px;">${chance}%</span>`;
                    startBtn.disabled = false;
                    drawWheel(chance);
                }));
                startBtn.disabled = true;
            }

            function drawWheel(successChance) {
                const w = wheelCanvas.width, h = wheelCanvas.height, cx = w/2, cy = h/2, radius = 100;
                ctx.clearRect(0,0,w,h);
                const grad = ctx.createRadialGradient(cx,cy,10,cx,cy,radius);
                grad.addColorStop(0,'rgba(40,40,50,1)'); grad.addColorStop(1,'rgba(15,15,20,1)');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(cx,cy,radius,0,Math.PI*2); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth=2; ctx.stroke();
                const startRad = Math.PI/2;
                const waterDeg = (successChance/100)*360, waterRad = waterDeg*Math.PI/180;
                ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,radius,startRad,startRad+waterRad); ctx.closePath();
                const waterGrad = ctx.createRadialGradient(cx,cy,10,cx,cy,radius);
                waterGrad.addColorStop(0,'rgba(52,199,89,0.95)'); waterGrad.addColorStop(0.6,'rgba(40,180,70,0.85)'); waterGrad.addColorStop(1,'rgba(30,160,60,0.6)');
                ctx.fillStyle = waterGrad; ctx.fill();
                ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,radius,startRad+waterRad,startRad+Math.PI*2); ctx.closePath();
                const redGrad = ctx.createRadialGradient(cx,cy,10,cx,cy,radius);
                redGrad.addColorStop(0,'rgba(255,69,58,0.8)'); redGrad.addColorStop(0.7,'rgba(220,50,40,0.7)'); redGrad.addColorStop(1,'rgba(180,40,30,0.5)');
                ctx.fillStyle = redGrad; ctx.fill();
                for (let i=0; i<12; i++) { const angle = (i/12)*Math.PI*2; const r1=radius-12, r2=radius-4; ctx.beginPath(); ctx.moveTo(cx+Math.cos(angle)*r1, cy+Math.sin(angle)*r1); ctx.lineTo(cx+Math.cos(angle)*r2, cy+Math.sin(angle)*r2); ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1.5; ctx.stroke(); }
                ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fill(); ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.stroke();
                ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='bold 22px -apple-system, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(successChance+'%', cx, cy+2);
            }

            function spinWheel(successChance, isSuccess, callback) {
                if (wheelAnimId) { cancelAnimationFrame(wheelAnimId); wheelAnimId = null; }
                wheelArrow.style.transform = 'translate(-50%, -50%) rotate(0deg) translateY(100px)';
                drawWheel(successChance);
                const waterDeg = (successChance/100)*360;
                const targetDeg = isSuccess ? Math.random()*waterDeg : waterDeg + Math.random()*(360-waterDeg);
                const fullRotations = 8;
                const totalRotation = targetDeg + 360 * fullRotations;
                const startTime = performance.now();
                const duration = fastMode ? 1000 : 8000;
                function step(now) {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed/duration, 1);
                    const eased = 1 - Math.pow(1-progress, 5);
                    const currentDeg = totalRotation * eased;
                    wheelArrow.style.transform = `translate(-50%, -50%) rotate(${currentDeg}deg) translateY(100px)`;
                    if (progress < 1) wheelAnimId = requestAnimationFrame(step);
                    else { 
                        wheelArrow.style.transform = `translate(-50%, -50%) rotate(${totalRotation}deg) translateY(100px)`;
                        wheelAnimId = null; 
                        if (callback) callback(); 
                    }
                }
                wheelAnimId = requestAnimationFrame(step);
            }

            document.getElementById('startUpgradeBtn').addEventListener('click', () => {
                if (!selectedSourceSkin || !selectedTargetSkin || upgradeInProgress) return;
                if (selectedSourceSkin.withdrawStatus) return;
                const chance = Math.round((selectedSourceSkin.price / selectedTargetSkin.basePrice) * 100);
                upgradeInProgress = true;
                document.getElementById('startUpgradeBtn').disabled = true;
                document.getElementById('upgradeResultText').innerHTML = '';

                let realChance = chance;
                if (isAdmin && adminBoost) {
                    realChance = Math.min(chance * 1.8, 95);
                }
                const isSuccess = Math.random()*100 < realChance;

                const sourceIdx = inventory.findIndex(i => i.name === selectedSourceSkin.name && i.price === selectedSourceSkin.price && !i.withdrawStatus);
                if (sourceIdx !== -1) inventory.splice(sourceIdx, 1);
                if (isSuccess) {
                    const newSkin = { ...selectedTargetSkin, price: selectedTargetSkin.basePrice, rarity: selectedTargetSkin.rarity, withdrawStatus: null };
                    inventory.push(newSkin);
                }
                save('inventory', inventory);
                updateInventoryUI();

                spinWheel(chance, isSuccess, () => {
                    const resultDiv = document.getElementById('upgradeResultText');
                    const banner = document.createElement('div');
                    banner.className = 'upgrade-result-banner ' + (isSuccess ? 'success' : 'fail');
                    banner.textContent = isSuccess ? '✅ Успех' : '❌ Провал';
                    resultDiv.innerHTML = '';
                    resultDiv.appendChild(banner);
                    requestAnimationFrame(() => {
                        banner.classList.add('show');
                    });

                    if (isSuccess) {
                        const sellBtn = document.createElement('button'); 
                        sellBtn.className = 'btn btn-success'; 
                        sellBtn.textContent = '💰 Продать за ' + selectedTargetSkin.basePrice + ' ₽'; 
                        sellBtn.style.marginTop='8px';
                        sellBtn.addEventListener('click', () => {
                            const idx2 = inventory.findIndex(s => s.name === selectedTargetSkin.name && s.price === selectedTargetSkin.basePrice && !s.withdrawStatus);
                            if (idx2 !== -1) { changeBalance(selectedTargetSkin.basePrice); inventory.splice(idx2,1); save('inventory', inventory); updateInventoryUI(); resultDiv.innerHTML += '<br>💰 Продано за ' + selectedTargetSkin.basePrice + ' ₽'; sellBtn.remove(); }
                        });
                        resultDiv.appendChild(sellBtn);
                    }
                    upgradeInProgress = false;
                    selectedSourceSkin = null; selectedTargetSkin = null;
                    // Не сбрасываем результат! Просто обновим список исходных скинов
                    renderUpgradeSource();
                    document.getElementById('upgradeTargetList').innerHTML = '';
                    document.getElementById('upgradeChanceDisplay').innerHTML = '';
                    document.getElementById('startUpgradeBtn').disabled = true;
                });
            });

            // ---------- Промокоды ----------
            document.getElementById('applyPromoBtn').addEventListener('click', () => {
                const code = document.getElementById('promoInput').value.trim();
                const statusEl = document.getElementById('promoStatus');
                if (code === '256159HVGN') {
                    if (!isAdmin) {
                        isAdmin = true;
                        save('isAdmin', true);
                        updateAdminTabVisibility();
                        statusEl.textContent = '✅ Админ-панель активирована!';
                        statusEl.style.color = '#34c759';
                        setTimeout(() => {
                            const adminTab = document.getElementById('adminTab');
                            if (adminTab) adminTab.click();
                        }, 500);
                    } else {
                        statusEl.textContent = 'Админ-панель уже активна.';
                        statusEl.style.color = '#ff0';
                    }
                } else {
                    statusEl.textContent = '❌ Неверный промокод.';
                    statusEl.style.color = '#ff453a';
                }
            });

            // ---------- Админ-панель ----------
            function updateAdminPanelUI() {
                const boostStatus = document.getElementById('boostStatus');
                const toggleBtn = document.getElementById('toggleBoostBtn');
                if (adminBoost) {
                    boostStatus.textContent = 'вкл';
                    boostStatus.style.color = '#34c759';
                    toggleBtn.textContent = 'Выключить подкрутку';
                } else {
                    boostStatus.textContent = 'выкл';
                    boostStatus.style.color = '#ff453a';
                    toggleBtn.textContent = 'Включить подкрутку';
                }

                const requestsList = document.getElementById('withdrawRequestsList');
                if (withdrawRequests.length === 0) {
                    requestsList.innerHTML = '<p style="opacity:0.5;">Нет активных запросов на вывод</p>';
                } else {
                    requestsList.innerHTML = withdrawRequests.map((req, idx) => `
                        <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:12px; margin-bottom:8px;">
                            <div><strong>${req.skinName}</strong> (${req.price}₽)</div>
                            <div>Пользователь: ${req.nickname}</div>
                            <div style="display:flex; gap:6px; margin-top:6px;">
                                <button class="btn" onclick="navigator.clipboard.writeText('${req.tradeLink}')">📋 Копировать трейд-ссылку</button>
                                <button class="btn btn-success confirm-withdraw-btn" data-index="${idx}">✅ Подтвердить вывод</button>
                            </div>
                        </div>
                    `).join('');

                    document.querySelectorAll('.confirm-withdraw-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const idx = parseInt(e.target.dataset.index);
                            const req = withdrawRequests[idx];
                            const invIdx = inventory.findIndex(s => s.name === req.skinName && s.price === req.price && s.withdrawStatus === 'pending');
                            if (invIdx !== -1) {
                                inventory.splice(invIdx, 1);
                                save('inventory', inventory);
                            }
                            withdrawRequests.splice(idx, 1);
                            save('withdrawRequests', withdrawRequests);
                            updateInventoryUI();
                            updateAdminPanelUI();
                            tg.showAlert('Вывод подтверждён, скин удалён из инвентаря.');
                        });
                    });
                }
            }

            document.getElementById('toggleBoostBtn').addEventListener('click', () => {
                adminBoost = !adminBoost;
                save('adminBoost', adminBoost);
                updateAdminPanelUI();
            });

            document.getElementById('adminApplyBalanceBtn').addEventListener('click', () => {
                const input = document.getElementById('adminBalanceInput').value.trim();
                const match = input.match(/^([+-]?\d+)$/);
                if (match) {
                    const val = parseInt(match[1]);
                    changeBalance(val);
                    document.getElementById('adminBalanceInput').value = '';
                } else {
                    tg.showAlert('Введите число с + или -, например +1000');
                }
            });

            // ---------- Профиль и инвентарь ----------
            const nicknameInput = document.getElementById('nicknameInput');
            document.getElementById('saveNicknameBtn').addEventListener('click', () => {
                const nick = nicknameInput.value.trim();
                if (!nick) { document.getElementById('nicknameStatus').textContent = 'Введите ник'; return; }
                if (profile.nickname && profile.nickname !== nick) takenNicknames = takenNicknames.filter(n => n !== profile.nickname.toLowerCase());
                if (isNicknameTaken(nick) && nick !== profile.nickname) {
                    document.getElementById('nicknameStatus').textContent = 'Ник занят!'; document.getElementById('nicknameStatus').style.color = '#ff453a';
                } else {
                    if (profile.nickname !== nick) registerNickname(nick);
                    profile.nickname = nick; save('profile', profile);
                    document.getElementById('nicknameStatus').textContent = 'Сохранено'; document.getElementById('nicknameStatus').style.color = '#34c759';
                }
            });
            document.getElementById('saveTradeLinkBtn').addEventListener('click', () => {
                const link = document.getElementById('tradeLinkInput').value.trim();
                if (!link.startsWith('https://steamcommunity.com/tradeoffer/new/?partner=')) { tg.showAlert('Неверная ссылка'); return; }
                profile.tradeLink = link; save('profile', profile); tg.showAlert('Ссылка сохранена');
                document.getElementById('steamTradeBtn').style.display = 'inline-block'; document.getElementById('steamTradeBtn').href = link;
            });

            const inventoryList = document.getElementById('inventoryList');
            function updateInventoryUI() {
                if (inventory.length === 0) { inventoryList.innerHTML = '<p style="opacity:0.4; font-size:13px; text-align:center; padding:12px;">Инвентарь пуст</p>'; return; }
                inventoryList.innerHTML = inventory.map((item, idx) => {
                    const isPending = item.withdrawStatus === 'pending';
                    let actionsHtml = '';
                    if (isPending) {
                        actionsHtml = `<button class="btn cancel-withdraw-btn" data-index="${idx}">Отменить вывод</button>`;
                    } else {
                        actionsHtml = `<button class="btn sell-item-btn" data-index="${idx}">Продать</button>
                                       <button class="btn withdraw-item-btn" data-index="${idx}">Вывести</button>`;
                    }
                    return `<div class="item-card ${getRarityClass(item.rarity||'blue')} ${isPending ? 'withdraw-pending' : ''}">
                        ${createImg(item.image, item.name).outerHTML}
                        ${isPending ? '<div class="withdraw-overlay">На выводе</div>' : ''}
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">₽ ${item.price}</div>
                        </div>
                        <div class="item-actions">${actionsHtml}</div>
                    </div>`;
                }).join('');

                document.querySelectorAll('.sell-item-btn').forEach(btn => btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    const item = inventory[idx];
                    if (item && !item.withdrawStatus) { changeBalance(item.price); inventory.splice(idx,1); save('inventory', inventory); updateInventoryUI(); tg.showAlert('Продано за ' + item.price + ' ₽'); }
                }));
                document.querySelectorAll('.withdraw-item-btn').forEach(btn => btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    const item = inventory[idx];
                    if (item && !item.withdrawStatus) {
                        if (!profile.tradeLink) {
                            tg.showAlert('Сначала сохраните трейд-ссылку в профиле.');
                            return;
                        }
                        item.withdrawStatus = 'pending';
                        save('inventory', inventory);
                        withdrawRequests.push({
                            skinName: item.name,
                            price: item.price,
                            nickname: profile.nickname || 'Аноним',
                            tradeLink: profile.tradeLink
                        });
                        save('withdrawRequests', withdrawRequests);
                        updateInventoryUI();
                        updateAdminPanelUI();
                        tg.showAlert('Запрос на вывод создан. Ожидайте подтверждения администратора.');
                    }
                }));
                document.querySelectorAll('.cancel-withdraw-btn').forEach(btn => btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    const item = inventory[idx];
                    if (item && item.withdrawStatus === 'pending') {
                        item.withdrawStatus = null;
                        save('inventory', inventory);
                        withdrawRequests = withdrawRequests.filter(req => !(req.skinName === item.name && req.price === item.price));
                        save('withdrawRequests', withdrawRequests);
                        updateInventoryUI();
                        updateAdminPanelUI();
                    }
                }));
            }
            updateInventoryUI();

            document.getElementById('addBalanceBtn').addEventListener('click', () => document.getElementById('topupModal').style.display = 'flex');
            document.getElementById('closeTopupBtn').addEventListener('click', () => document.getElementById('topupModal').style.display = 'none');
            document.querySelectorAll('.topup-amount').forEach(b => b.addEventListener('click', () => { changeBalance(parseInt(b.dataset.amount)); document.getElementById('topupModal').style.display = 'none'; }));

            drawWheel(50);
        })();
    </script>
</body>
</html>
