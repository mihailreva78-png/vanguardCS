<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>VANGUARD | Кейсы и Апгрейд</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <style>
        /* --- Стили без изменений (сокращены для экономии места) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            padding: 16px;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #4A90E2;
        }
        .balance-block {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .balance {
            font-weight: 600;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .add-balance-btn {
            background: rgba(74, 144, 226, 0.2);
            border: 1px solid rgba(74, 144, 226, 0.4);
            color: #4A90E2;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-balance-btn:active {
            transform: scale(0.9);
            background: rgba(74, 144, 226, 0.4);
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .tabs::-webkit-scrollbar {
            display: none;
        }
        .tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.7);
        }
        .tab.active {
            background: rgba(74, 144, 226, 0.2);
            border-color: rgba(74, 144, 226, 0.4);
            color: #fff;
            font-weight: 600;
        }
        .section {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .section.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .case-category-title {
            font-size: 16px;
            font-weight: 700;
            margin: 16px 0 8px;
            color: #4A90E2;
            text-transform: uppercase;
            letter-spacing: 1px;
            grid-column: 1 / -1;
        }
        .cases-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .case-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
        }
        .case-card:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.06);
        }
        .case-image {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .case-name {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 13px;
        }
        .case-price {
            color: #4A90E2;
            font-weight: 500;
            font-size: 13px;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            overflow-y: auto;
        }
        .modal-fullscreen {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background: rgba(20, 20, 20, 0.97);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: none;
            border-radius: 0;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .modal {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .case-roulette {
            position: relative;
            width: 100%;
            height: 100px;
            overflow: hidden;
            margin: 16px 0;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            touch-action: pan-y;
        }
        .roulette-track {
            display: flex;
            gap: 0;
            position: absolute;
            left: 50%;
            transform: translateX(calc(-50% + 0px));
            transition: none;
            will-change: transform;
        }
        .roulette-item {
            flex: 0 0 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }
        .roulette-item img {
            max-height: 64px;
            max-width: 64px;
            object-fit: contain;
            border-radius: 6px;
        }
        .roulette-center-marker {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: #4A90E2;
            box-shadow: 0 0 16px #4A90E2;
            z-index: 2;
            border-radius: 2px;
            opacity: 0.7;
        }
        .btn {
            background: rgba(74, 144, 226, 0.15);
            border: 1px solid rgba(74, 144, 226, 0.3);
            color: #fff;
            border-radius: 14px;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
            margin: 6px 0;
            display: inline-block;
            user-select: none;
        }
        .btn:active {
            background: rgba(74, 144, 226, 0.3);
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .btn-block {
            display: block;
            width: 100%;
        }
        .btn-success {
            background: rgba(52, 199, 89, 0.15);
            border-color: rgba(52, 199, 89, 0.3);
        }
        .btn-gold {
            background: rgba(255, 215, 0, 0.15);
            border-color: rgba(255, 215, 0, 0.3);
        }
        .input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 12px;
            color: #fff;
            width: 100%;
            margin: 6px 0;
            outline: none;
            font-size: 14px;
        }
        .input:focus {
            border-color: #4A90E2;
        }
        .rarity-blue {
            background: linear-gradient(135deg, #4B69FF, #2563EB);
        }
        .rarity-purple {
            background: linear-gradient(135deg, #8847FF, #7C3AED);
        }
        .rarity-pink {
            background: linear-gradient(135deg, #D32CE6, #A21CAF);
        }
        .rarity-red {
            background: linear-gradient(135deg, #EB4B4B, #DC2626);
        }
        .rarity-gold {
            background: linear-gradient(135deg, #FFD700, #B8860B);
        }
        .rarity-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            margin-left: 8px;
        }

        /* --- UPGRADE --- */
        .upgrade-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wheel-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 20px auto;
        }
        .wheel-canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(74, 144, 226, 0.15), 0 0 60px rgba(0, 0, 0, 0.6);
        }
        .wheel-arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(0deg) translateY(100px);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-bottom: 24px solid #fff;
            filter: drop-shadow(0 0 8px rgba(74, 144, 226, 0.6));
            z-index: 5;
            transition: none;
            transform-origin: center center;
        }
        .upgrade-columns {
            display: flex;
            gap: 12px;
            width: 100%;
            margin: 12px 0;
        }
        .upgrade-col {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 120px;
            max-height: 200px;
            overflow-y: auto;
        }
        .upgrade-col h4 {
            text-align: center;
            margin-bottom: 4px;
            font-size: 13px;
            opacity: 0.7;
            flex-shrink: 0;
        }
        .upgrade-card {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 6px 8px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
            font-size: 11px;
            flex-shrink: 0;
        }
        .upgrade-card img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .upgrade-card.selected {
            border-color: #4A90E2;
            background: rgba(74, 144, 226, 0.2);
        }
        .chance-badge {
            margin-left: auto;
            font-size: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 8px;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .upgrade-result-banner {
            font-size: 18px;
            font-weight: 700;
            padding: 12px 20px;
            border-radius: 16px;
            text-align: center;
            margin: 8px 0;
            width: 100%;
        }
        .upgrade-result-banner.success {
            background: rgba(52, 199, 89, 0.15);
            border: 1px solid rgba(52, 199, 89, 0.3);
            color: #34c759;
        }
        .upgrade-result-banner.fail {
            background: rgba(255, 69, 58, 0.15);
            border: 1px solid rgba(255, 69, 58, 0.3);
            color: #ff453a;
        }

        /* --- INVENTORY --- */
        .inventory-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }
        .item-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            gap: 10px;
        }
        .item-card img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .item-card .item-info {
            flex: 1;
            min-width: 0;
        }
        .item-card .item-name {
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-card .item-price {
            font-size: 12px;
            opacity: 0.7;
        }
        .item-card .item-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .item-card .item-actions .btn {
            padding: 4px 12px;
            font-size: 11px;
            margin: 0;
        }

        .case-contents {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 12px 0;
            max-width: 400px;
            width: 100%;
        }
        .case-item-card {
            width: 80px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 6px;
            text-align: center;
            font-size: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .case-item-card img {
            width: 52px;
            height: 52px;
            object-fit: contain;
            margin-bottom: 2px;
            border-radius: 4px;
        }
        .case-item-card .item-label {
            font-size: 9px;
            opacity: 0.9;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .case-item-card .item-price-tag {
            font-size: 9px;
            color: #4A90E2;
            font-weight: 600;
        }

        .multi-panels {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin: 12px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .multi-panel {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .multi-panel .mp-info {
            flex: 1;
            min-width: 0;
        }
        .multi-panel .mp-name {
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .multi-panel .mp-status {
            font-size: 11px;
            opacity: 0.6;
        }
        .multi-panel .mp-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .multi-panel .mp-actions .btn {
            padding: 4px 12px;
            font-size: 11px;
            margin: 0;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin: 8px 0 4px;
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            outline: none;
            margin: 6px 0;
            touch-action: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4A90E2;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(74, 144, 226, 0.4);
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4A90E2;
            cursor: pointer;
            border: none;
        }

        .drop-progress-wrap {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            height: 6px;
            margin: 8px 0 4px;
            overflow: hidden;
        }
        .drop-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4A90E2, #34c759);
            border-radius: 10px;
            transition: width 0.15s linear;
        }
        .drop-progress-label {
            font-size: 11px;
            opacity: 0.6;
            text-align: center;
            margin-top: 2px;
        }

        .flex-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .flex-row .btn {
            flex: 1;
            min-width: 80px;
        }
        .text-center {
            text-align: center;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mb-8 {
            margin-bottom: 8px;
        }

        @media (max-width: 480px) {
            .modal-fullscreen {
                padding: 12px;
            }
            .wheel-wrapper {
                width: 180px;
                height: 180px;
            }
            .wheel-canvas {
                width: 180px;
                height: 180px;
            }
            .wheel-arrow {
                transform: translate(-50%, -50%) rotate(0deg) translateY(80px);
                border-left-width: 12px;
                border-right-width: 12px;
                border-bottom-width: 20px;
            }
            .roulette-item {
                flex: 0 0 64px;
                height: 64px;
            }
            .roulette-item img {
                max-height: 52px;
                max-width: 52px;
            }
            .case-item-card {
                width: 68px;
            }
            .case-item-card img {
                width: 44px;
                height: 44px;
            }
            .upgrade-col {
                min-height: 80px;
                max-height: 140px;
            }
            .upgrade-card img {
                width: 26px;
                height: 26px;
            }
            .upgrade-card {
                font-size: 10px;
                padding: 4px 6px;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="logo">VANGUARD</div>
        <div class="balance-block">
            <div class="balance" id="balanceDisplay">₽ 1000</div>
            <div class="add-balance-btn" id="addBalanceBtn">+</div>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab active" data-section="cases">Кейсы</button>
        <button class="tab" data-section="upgrade">Апгрейд</button>
        <button class="tab" data-section="profile">Профиль</button>
    </div>

    <!-- ===== SECTION: CASES ===== -->
    <div id="section-cases" class="section active">
        <div class="glass-panel" style="margin-bottom:12px;">
            <h3>Выберите кейс</h3>
        </div>
        <div class="cases-grid" id="casesContainer"></div>
    </div>

    <!-- ===== SECTION: UPGRADE ===== -->
    <div id="section-upgrade" class="section">
        <div class="glass-panel">
            <h3>Апгрейд скинов</h3>
            <p style="font-size:12px; color:rgba(255,255,255,0.5);">Выберите скин и цель (шанс до 80%)</p>
        </div>
        <div class="upgrade-container">
            <div class="wheel-wrapper" id="wheelWrapper">
                <canvas id="wheelCanvas" class="wheel-canvas" width="220" height="220"></canvas>
                <div class="wheel-arrow" id="wheelArrow"></div>
            </div>
            <div class="upgrade-columns">
                <div class="upgrade-col">
                    <h4>🎒 Ваш скин</h4>
                    <div id="upgradeSourceList"></div>
                </div>
                <div class="upgrade-col">
                    <h4>🎯 Цель</h4>
                    <div id="upgradeTargetList"></div>
                </div>
            </div>
            <div id="upgradeChanceDisplay" style="text-align:center; margin:4px 0; font-weight:600; font-size:15px;"></div>
            <button class="btn btn-block" id="startUpgradeBtn" disabled>🔧 Апгрейд</button>
            <div id="upgradeResultText" style="text-align:center; margin-top:8px;"></div>
        </div>
    </div>

    <!-- ===== SECTION: PROFILE ===== -->
    <div id="section-profile" class="section">
        <div class="glass-panel">
            <h3>Профиль</h3>
            <div style="margin:8px 0;">
                <label>Никнейм:</label>
                <div style="display:flex; gap:8px;">
                    <input class="input" id="nicknameInput" placeholder="Введите ник" />
                    <button class="btn" id="saveNicknameBtn">Сохранить</button>
                </div>
                <div id="nicknameStatus" style="font-size:12px; margin-top:4px;"></div>
            </div>
            <div style="margin:16px 0;">
                <label>Trade-ссылка CS:GO:</label>
                <input class="input" id="tradeLinkInput" placeholder="https://steamcommunity.com/tradeoffer/new/?partner=..." />
                <button class="btn" id="saveTradeLinkBtn" style="margin-top:4px;">Сохранить</button>
                <a id="steamTradeBtn" class="btn" style="display:none; margin-top:8px; text-decoration:none;" target="_blank">🔗 Перейти к трейду</a>
            </div>
        </div>
        <div class="glass-panel">
            <h3>Инвентарь</h3>
            <div class="inventory-list" id="inventoryList"></div>
            <p style="color:rgba(255,255,255,0.3); margin-top:8px; font-size:12px;">Продажа или вывод в трейд</p>
        </div>
    </div>

    <!-- ===== MODAL: CASE ===== -->
    <div id="caseModal" class="modal-overlay" style="display:none;">
        <div class="modal-fullscreen">
            <h3 id="caseModalTitle" style="margin-bottom:4px;">Кейс</h3>
            <div class="case-roulette" id="rouletteContainer">
                <div class="roulette-track" id="rouletteTrack"></div>
                <div class="roulette-center-marker"></div>
            </div>
            <div class="drop-progress-wrap">
                <div class="drop-progress-bar" id="dropProgressBar"></div>
            </div>
            <div id="dropProgressLabel" class="drop-progress-label">🎯 Готов к открытию</div>
            <div id="caseResultText" style="font-weight:600; min-height:28px; margin:4px 0;"></div>

            <!-- Slider 1-10 -->
            <div style="width:100%; margin:8px 0;">
                <div class="slider-label">
                    <span>Количество кейсов</span>
                    <span id="caseCountLabel">1</span>
                </div>
                <input type="range" id="caseCountSlider" min="1" max="10" value="1" step="1" />
            </div>

            <button class="btn btn-block" id="openCaseBtn">Открыть за X ₽</button>

            <!-- Multi-panels -->
            <div id="multiPanelsContainer" class="multi-panels"></div>

            <!-- Contents preview -->

        // ---------- Хелперы ----------
        function createImg(src, alt, className) {

            img.onerror = function() { this.src = fallbackSkinImg; };

        }

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            const el = document.getElementById('section-' + sectionId);
            if (el) el.classList.add('active');
            if (sectionId === 'profile') updateInventoryUI();
            if (sectionId === 'upgrade') refreshUpgradeTab();
        }
        document.querySelectorAll('.tab').forEach(tab => {

                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

                    lastCategory = c.category;

                html += `

            updateMultiPanels();
            caseModal.style.display = 'flex';

        }

        // Анимация рулетки
        function animateRoulette(containerId, trackId, items, selectedItem, durationMs, callback) {
            const track = document.getElementById(trackId);
            const container = document.getElementById(containerId);
            const itemWidth = 80;
            const repeated = [];
            for (let i = 0; i < 8; i++) repeated.push(...items);
            track.innerHTML = repeated.map(item =>
                `<div class="roulette-item">${createImg(item.image, item.name, '').outerHTML}</div>`
            ).join('');

            const selectedIndex = repeated.findIndex(it => it.name === selectedItem.name);
            if (selectedIndex === -1) { if (callback) callback(); return; }

            const containerWidth = container.offsetWidth || 400;
            const targetOffset = -selectedIndex * itemWidth + containerWidth / 2 - itemWidth / 2;
            const extraOffset = (Math.random() - 0.5) * 10;
            const finalOffset = targetOffset + extraOffset;

            const startTime = performance.now();
            const startOffset = 0;
            const totalDistance = finalOffset - startOffset;

            function step(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / durationMs, 1);
                const eased = 1 - Math.pow(1 - progress, 4);
                const currentOffset = startOffset + totalDistance * eased;
                track.style.transform = `translateX(calc(-50% + ${currentOffset}px))`;
                if (progress < 1) {
                    requestAnimationFrame(step);
                } else {
                    track.style.transform = `translateX(calc(-50% + ${finalOffset}px))`;
                    if (callback) callback();
                }
            }
            requestAnimationFrame(step);
        }

        // Основная функция открытия
        function performCaseOpening() {
            if (isCaseOpening || currentCaseIdx === null) return;
            const caseData = cases[currentCaseIdx];
            const totalCost = caseData.price * caseOpenCount;
            if (balance < totalCost) {
                tg.showAlert('Недостаточно средств!');
                return;
            }
            changeBalance(-totalCost);
            isCaseOpening = true;
            openCaseBtn.disabled = true;
            againCaseBtn.style.display = 'none';
            caseResultText.innerHTML = '';
            dropProgressBar.style.width = '0%';
            dropProgressLabel.textContent = '🎰 Открываем...';

            const items = caseData.items;
            const results = [];
            for (let i = 0; i < caseOpenCount; i++) {
                const selected = items[Math.floor(Math.random() * items.length)];
                results.push({ ...selected, index: i });
            }
            caseResults = results;

            // Обновляем панели
            results.forEach((res, i) => {
                const nameEl = document.getElementById('mp-name-' + i);
                const statusEl = document.getElementById('mp-status-' + i);
                const resultEl = document.getElementById('mp-result-' + i);
                const actionsEl = document.getElementById('mp-actions-' + i);
                if (nameEl) nameEl.textContent = res.name;
                if (statusEl) statusEl.textContent = '🔮 вращается...';
                if (resultEl) resultEl.textContent = '⏳';
                if (actionsEl) actionsEl.innerHTML = '';
            });

            let completed = 0;
            const totalItems = results.length;

            function animateNext(idx) {
                if (idx >= totalItems) {
                    // Все открыты
                    dropProgressLabel.textContent = '✅ Все открыты!';
                    isCaseOpening = false;
                    openCaseBtn.disabled = true;
                    againCaseBtn.style.display = 'block';

                    // Добавляем скины в инвентарь
                    results.forEach(r => {
                        inventory.push({ ...r });
                    });
                    save('inventory', inventory);
                    updateInventoryUI();

                    const names = results.map(r => r.name).join(', ');
                    caseResultText.innerHTML =
                        `🎉 Выпало: <span style="font-weight:700;">${names}</span>`;

                    const sellAllBtn = document.createElement('button');
                    sellAllBtn.className = 'btn btn-success';
                    sellAllBtn.textContent = '💰 Продать всё';
                    sellAllBtn.style.marginTop = '8px';
                    sellAllBtn.addEventListener('click', () => {
                        let total = 0;
                        results.forEach(r => { total += r.price; });
                        changeBalance(total);
                        for (let i = 0; i < results.length; i++) {
                            const idx2 = inventory.findIndex(s => s.name === results[i].name && s
                            .price === results[i].price);
                            if (idx2 !== -1) inventory.splice(idx2, 1);
                        }
                        save('inventory', inventory);
                        updateInventoryUI();
                        caseResultText.innerHTML += `<br>💰 Продано за ${total} ₽`;
                        sellAllBtn.remove();
                        document.querySelectorAll('.mp-actions .btn-sell-single').forEach(b => b.remove());
                        // Обновить статусы в панелях
                        results.forEach((r, i) => {
                            const st = document.getElementById('mp-status-' + i);
                            if (st) st.textContent = '💰 продан';
                            const resEl = document.getElementById('mp-result-' + i);
                            if (resEl) resEl.textContent = '✅';
                            const act = document.getElementById('mp-actions-' + i);
                            if (act) act.innerHTML = '';
                        });
                    });
                    caseResultText.appendChild(sellAllBtn);
                    return;
                }

                const res = results[idx];
                const statusEl = document.getElementById('mp-status-' + idx);
                const resultEl = document.getElementById('mp-result-' + idx);
                const actionsEl = document.getElementById('mp-actions-' + idx);

                const progress = ((idx + 1) / totalItems) * 100;
                dropProgressBar.style.width = progress + '%';
                dropProgressLabel.textContent = `🎯 ${idx+1}/${totalItems} — ${res.name}`;

                animateRoulette('rouletteContainer', 'rouletteTrack', items, res, 1800 + Math.random() * 600, () => {
                    if (statusEl) statusEl.textContent = '✅ выпал!';
                    if (resultEl) {
                        const badge = document.createElement('span');
                        badge.className = 'rarity-badge ' + getRarityClass(res.rarity);
                        badge.textContent = res.name;
                        resultEl.innerHTML = '';
                        resultEl.appendChild(badge);
                    }
                    if (actionsEl) {
                        const sellBtn = document.createElement('button');
                        sellBtn.className = 'btn btn-success btn-sell-single';
                        sellBtn.textContent = `Продать за ${res.price}₽`;
                        sellBtn.style.padding = '2px 10px';
                        sellBtn.style.fontSize = '10px';
                        sellBtn.addEventListener('click', () => {
                            const idxInv = inventory.findIndex(s => s.name === res.name && s.price === res
                                .price);
                            if (idxInv !== -1) {
                                changeBalance(res.price);
                                inventory.splice(idxInv, 1);
                                save('inventory', inventory);
                                updateInventoryUI();
                                if (statusEl) statusEl.textContent = '💰 продан';
                                if (resultEl) resultEl.textContent = '✅';
                                actionsEl.innerHTML = '';
                                const resIdx = results.findIndex(r => r === res);
                                if (resIdx !== -1) results.splice(resIdx, 1);
                            }
                        });
                        actionsEl.appendChild(sellBtn);
                    }

                    setTimeout(() => {
                        completed++;
                        animateNext(idx + 1);
                    }, 300);
                });
            }

            setTimeout(() => {
                animateNext(0);
            }, 400);
        }

        // Нажатие "Открыть"
        openCaseBtn.addEventListener('click', performCaseOpening);

        // Нажатие "Ещё раз"
        againCaseBtn.addEventListener('click', () => {

            // Сбрасываем всё и запускаем заново
            caseResultText.innerHTML = '';
            dropProgressBar.style.width = '0%';
            dropProgressLabel.textContent = '🎯 Готов к открытию';
            caseResults = [];
            updateMultiPanels();
            // Перезапускаем открытие
            performCaseOpening();
        });

        closeCaseBtn.addEventListener('click', () => {
            if (isCaseOpening) return;
            caseModal.style.display = 'none';
            currentCaseIdx = null;
            caseResults = [];
            againCaseBtn.style.display = 'none';
        });

        // Закрытие по клику на оверлей
        window.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay') && e.target.id !== 'caseModal') {
                e.target.style.display = 'none';
            }
        });

        // ============================================================
        //  АПГРЕЙД — с правильной логикой (зелёная = успех)
        // ============================================================
        let selectedSourceSkin = null;
        let selectedTargetSkin = null;
        let wheelAnimId = null;

        const wheelCanvas = document.getElementById('wheelCanvas');
        const ctx = wheelCanvas.getContext('2d');
        const wheelArrow = document.getElementById('wheelArrow');

        function refreshUpgradeTab() {
            renderUpgradeSource();
            selectedTargetSkin = null;
            document.getElementById('upgradeTargetList').innerHTML = '';
            document.getElementById('upgradeChanceDisplay').innerHTML = '';
            document.getElementById('startUpgradeBtn').disabled = true;
            document.getElementById('upgradeResultText').innerHTML = '';
            drawWheel(50);
            wheelArrow.style.transform = 'translate(-50%, -50%) rotate(0deg) translateY(100px)';
        }

        function renderUpgradeSource() {
            const container = document.getElementById('upgradeSourceList');
            if (inventory.length === 0) {
                container.innerHTML = '<p style="opacity:0.4; font-size:12px;">Инвентарь пуст</p>';
                return;
            }
            container.innerHTML = inventory.map((item, idx) => `
            <div class="upgrade-card ${getRarityClass(item.rarity || 'blue')}" data-index="${idx}">
              ${createImg(item.image, item.name, '').outerHTML}
              <div style="flex:1; font-weight:600; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.name}</div>
              <div style="font-size:10px; opacity:0.7;">₽${item.price}</div>
            </div>
          `).join('');
            document.querySelectorAll('#upgradeSourceList .upgrade-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('#upgradeSourceList .upgrade-card').forEach(c => c.classList
                        .remove('selected'));
                    card.classList.add('selected');
                    const idx = parseInt(card.dataset.index);
                    selectedSourceSkin = inventory[idx];
                    renderUpgradeTargets();
                });
            });
        }

        function renderUpgradeTargets() {
            if (!selectedSourceSkin) return;
            const container = document.getElementById('upgradeTargetList');
            const chanceDisplay = document.getElementById('upgradeChanceDisplay');
            const startBtn = document.getElementById('startUpgradeBtn');

            const validTargets = allSkins.filter(s => {
                if (s.name === selectedSourceSkin.name) return false;
                const chance = Math.round((selectedSourceSkin.price / s.basePrice) * 100);
                return chance <= 80 && s.basePrice > selectedSourceSkin.price;
            });

            if (validTargets.length === 0) {
                container.innerHTML = '<p style="opacity:0.4; font-size:12px;">Нет подходящих целей</p>';
                startBtn.disabled = true;
                chanceDisplay.innerHTML = '';
                return;
            }
            container.innerHTML = validTargets.map(skin => {
                const chance = Math.round((selectedSourceSkin.price / skin.basePrice) * 100);
                return `
              <div class="upgrade-card ${getRarityClass(skin.rarity)}" data-name="${skin.name}">
                ${createImg(skin.image, skin.name, '').outerHTML}
                <div style="flex:1; font-weight:600; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${skin.name}</div>
                <span class="chance-badge">${chance}%</span>
              </div>
            `;
            }).join('');

            document.querySelectorAll('#upgradeTargetList .upgrade-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('#upgradeTargetList .upgrade-card').forEach(c => c.classList
                        .remove('selected'));
                    card.classList.add('selected');
                    selectedTargetSkin = validTargets.find(s => s.name === card.dataset.name);
                    const chance = Math.round((selectedSourceSkin.price / selectedTargetSkin.basePrice) *
                    100);
                    chanceDisplay.innerHTML =
                        `Шанс успеха: <span style="color:#4A90E2; font-size:20px;">${chance}%</span>`;
                    startBtn.disabled = false;
                    drawWheel(chance);
                });
            });
            startBtn.disabled = true;
            chanceDisplay.innerHTML = '';
        }

        // Рисуем колесо с "водой" (зелёная зона снизу)
        function drawWheel(successChance) {
            const w = wheelCanvas.width,
                h = wheelCanvas.height;
            const cx = w / 2,
                cy = h / 2,
                radius = 100;

            ctx.clearRect(0, 0, w, h);
            const grad = ctx.createRadialGradient(cx, cy, 10, cx, cy, radius);
            grad.addColorStop(0, 'rgba(40,40,50,1)');
            grad.addColorStop(1, 'rgba(15,15,20,1)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 2;
            ctx.stroke();

            const waterDeg = (successChance / 100) * 360;
            const waterRad = waterDeg * Math.PI / 180;
            const startRad = Math.PI / 2;
            const endRad = startRad + waterRad;

            // Зелёная зона
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, radius, startRad, endRad);
            ctx.closePath();
            const waterGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, radius);
            waterGrad.addColorStop(0, 'rgba(52,199,89,0.95)');
            waterGrad.addColorStop(0.6, 'rgba(40,180,70,0.85)');
            waterGrad.addColorStop(1, 'rgba(30,160,60,0.6)');
            ctx.fillStyle = waterGrad;
            ctx.fill();

            // Красная зона
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, radius, endRad, startRad + Math.PI * 2);
            ctx.closePath();
            const redGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, radius);
            redGrad.addColorStop(0, 'rgba(255,69,58,0.8)');
            redGrad.addColorStop(0.7, 'rgba(220,50,40,0.7)');
            redGrad.addColorStop(1, 'rgba(180,40,30,0.5)');
            ctx.fillStyle = redGrad;
            ctx.fill();

            // Блик на воде
            if (waterDeg > 5) {
                const midAngle = startRad + waterRad / 2;
                const bx = cx + Math.cos(midAngle) * radius * 0.5;
                const by = cy + Math.sin(midAngle) * radius * 0.5;
                const blik = ctx.createRadialGradient(bx - 10, by - 10, 2, bx, by, 25);
                blik.addColorStop(0, 'rgba(255,255,255,0.2)');
                blik.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = blik;
                ctx.beginPath();
                ctx.arc(bx, by, 25, 0, Math.PI * 2);
                ctx.fill();
            }

            // Деления
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
                const r1 = radius - 12;
                const r2 = radius - 4;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(angle) * r1, cy + Math.sin(angle) * r1);
                ctx.lineTo(cx + Math.cos(angle) * r2, cy + Math.sin(angle) * r2);
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            ctx.beginPath();
            ctx.arc(cx, cy, 6, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = 'bold 22px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(successChance + '%', cx, cy + 2);
        }

        // Анимация остановки (6 секунд) — успех = зелёная зона
        function spinWheel(successChance, callback) {
            drawWheel(successChance);

            const isSuccess = Math.random() * 100 < successChance;
            const waterDeg = (successChance / 100) * 360;
            let targetDeg;
            if (isSuccess) {
                targetDeg = Math.random() * waterDeg; // зелёная
            } else {
                targetDeg = waterDeg + Math.random() * (360 - waterDeg); // красная
            }
            const totalRotation = targetDeg + 360 * 8 + Math.random() * 360;

            const startTime = performance.now();
            const duration = 6000;

            function step(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 5);
                const currentDeg = totalRotation * eased;
                wheelArrow.style.transform = `translate(-50%, -50%) rotate(${currentDeg}deg) translateY(100px)`;

                if (progress < 1) {
                    wheelAnimId = requestAnimationFrame(step);
                } else {
                    wheelArrow.style.transform =
                        `translate(-50%, -50%) rotate(${targetDeg + 360 * 8}deg) translateY(100px)`;
                    if (callback) callback(isSuccess);
                }
            }
            wheelAnimId = requestAnimationFrame(step);
        }

        document.getElementById('startUpgradeBtn').addEventListener('click', () => {
            if (!selectedSourceSkin || !selectedTargetSkin || upgradeInProgress) return;
            const chance = Math.round((selectedSourceSkin.price / selectedTargetSkin.basePrice) * 100);
            upgradeInProgress = true;
            document.getElementById('startUpgradeBtn').disabled = true;
            document.getElementById('upgradeResultText').innerHTML = '';

            spinWheel(chance, (isSuccess) => {
                const sourceIdx = inventory.findIndex(i =>
                    i.name === selectedSourceSkin.name && i.price === selectedSourceSkin.price
                );
                if (sourceIdx !== -1) inventory.splice(sourceIdx, 1);

                const resultDiv = document.getElementById('upgradeResultText');
                if (isSuccess) {
                    const newSkin = { ...selectedTargetSkin, price: selectedTargetSkin.basePrice,
                        rarity: selectedTargetSkin.rarity };
                    inventory.push(newSkin);
                    resultDiv.innerHTML =
                        `<div class="upgrade-result-banner success">✅ Успех!<br><span style="font-size:16px;">${selectedTargetSkin.name}</span></div>`;
                    const sellBtn = document.createElement('button');
                    sellBtn.className = 'btn btn-success';
                    sellBtn.textContent = '💰 Продать за ' + newSkin.price + ' ₽';
                    sellBtn.style.marginTop = '8px';
                    sellBtn.addEventListener('click', () => {
                        const idx2 = inventory.findIndex(s => s.name === newSkin.name && s.price === newSkin
                            .price);
                        if (idx2 !== -1) {
                            changeBalance(newSkin.price);
                            inventory.splice(idx2, 1);
                            save('inventory', inventory);
                            updateInventoryUI();
                            resultDiv.innerHTML += `<br>💰 Продано за ${newSkin.price} ₽`;
                            sellBtn.remove();
                        }
                    });
                    resultDiv.appendChild(sellBtn);
                } else {
                    resultDiv.innerHTML =
                        `<div class="upgrade-result-banner fail">❌ Неудача. Скин уничтожен.</div>`;
                }

                save('inventory', inventory);
                updateInventoryUI();
                selectedSourceSkin = null;
                selectedTargetSkin = null;
                upgradeInProgress = false;
                refreshUpgradeTab();
            });
        });

        // ============================================================
        //  ПРОФИЛЬ
        // ============================================================
        const nicknameInput = document.getElementById('nicknameInput');
        const nicknameStatus = document.getElementById('nicknameStatus');
        const tradeLinkInput = document.getElementById('tradeLinkInput');
        const steamTradeBtn = document.getElementById('steamTradeBtn');

        function loadProfile() {
            profile = load('profile', { nickname: '', tradeLink: '' });
            nicknameInput.value = profile.nickname || '';
            tradeLinkInput.value = profile.tradeLink || '';
            steamTradeBtn.style.display = profile.tradeLink ? 'inline-block' : 'none';
            if (profile.tradeLink) steamTradeBtn.href = profile.tradeLink;
        }
        loadProfile();

        document.getElementById('saveNicknameBtn').addEventListener('click', () => {
            const nick = nicknameInput.value.trim();
            if (!nick) { nicknameStatus.textContent = 'Введите ник'; return; }
            if (profile.nickname && profile.nickname !== nick) {
                takenNicknames = takenNicknames.filter(n => n !== profile.nickname.toLowerCase());
            }
            if (isNicknameTaken(nick) && nick !== profile.nickname) {
                nicknameStatus.textContent = 'Ник занят!';
                nicknameStatus.style.color = '#ff453a';
            } else {
                if (profile.nickname !== nick) registerNickname(nick);
                profile.nickname = nick;
                save('profile', profile);
                nicknameStatus.textContent = 'Сохранено';
                nicknameStatus.style.color = '#34c759';
            }
        });

        document.getElementById('saveTradeLinkBtn').addEventListener('click', () => {
            const link = tradeLinkInput.value.trim();
            if (!link.startsWith('https://steamcommunity.com/tradeoffer/new/?partner=')) {
                tg.showAlert('Неверная ссылка');
                return;
            }
            profile.tradeLink = link;
            save('profile', profile);
            tg.showAlert('Ссылка сохранена');
            loadProfile();
        });

        // ============================================================
        //  ИНВЕНТАРЬ
        // ============================================================
        const inventoryList = document.getElementById('inventoryList');

        function updateInventoryUI() {
            if (inventory.length === 0) {
                inventoryList.innerHTML =
                '<p style="opacity:0.4; font-size:13px; text-align:center; padding:12px;">Инвентарь пуст</p>';
                return;
            }
            inventoryList.innerHTML = inventory.map((item, idx) => `
            <div class="item-card ${getRarityClass(item.rarity || 'blue')}">
              ${createImg(item.image, item.name, '').outerHTML}
              <div class="item-info">
                <div class="item-name">${item.name}</div>
                <div class="item-price">₽ ${item.price}</div>
              </div>
              <div class="item-actions">
                <button class="btn sell-item-btn" data-index="${idx}">Продать</button>
                <button class="btn withdraw-item-btn" data-index="${idx}">Вывести</button>
              </div>
            </div>
          `).join('');

            document.querySelectorAll('.sell-item-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    const item = inventory[idx];
                    if (!item) return;
                    changeBalance(item.price);
                    inventory.splice(idx, 1);
                    save('inventory', inventory);
                    updateInventoryUI();
                    tg.showAlert('Продано за ' + item.price + ' ₽');
                });
            });

            document.querySelectorAll('.withdraw-item-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (!profile.tradeLink) tg.showAlert('Сначала сохраните трейд-ссылку');
                    else tg.openLink(profile.tradeLink);
                });
            });
        }
        updateInventoryUI();

        // ============================================================
        //  ПОПОЛНЕНИЕ
        // ============================================================
        document.getElementById('addBalanceBtn').addEventListener('click', () => {
            document.getElementById('topupModal').style.display = 'flex';
        });
        document.getElementById('closeTopupBtn').addEventListener('click', () => {
            document.getElementById('topupModal').style.display = 'none';
        });
        document.querySelectorAll('.topup-amount').forEach(btn => {
            btn.addEventListener('click', () => {
                changeBalance(parseInt(btn.dataset.amount));
                document.getElementById('topupModal').style.display = 'none';
            });
        });

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        drawWheel(50);
        if (document.getElementById('section-upgrade').classList.contains('active')) refreshUpgradeTab();

        console.log('✅ VANGUARD загружен — все баги исправлены!');
    </script>

</body>
</html>
